<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Leo y Juego</title>
<script>
/* APLICAR ACTUALIZACIÓN: si en una apertura anterior se descargó una versión
   más nueva del index.html, usarla en lugar de esta.

   POR QUÉ ASÍ (historia del bug): antes se usaba document.write dentro del <head>.
   Eso causaba DOS problemas: (1) al correr durante el parseo del documento, no
   reemplazaba sino que ANIDABA el HTML nuevo -> se veían dos barras "Leo y Juego"
   y un espacio en blanco gigante; (2) el contexto de JavaScript no se limpiaba, así
   que las constantes de la versión vieja (VOCALES, etc.) chocaban con las nuevas.

   SOLUCIÓN: cargamos el HTML nuevo en un Blob y navegamos a él con location.replace.
   Eso le da a la versión nueva una página y un contexto JS completamente frescos:
   no se duplica nada y no hay choques de variables. */
(function(){
  try{
    var V_ACTUAL = 22; // debe coincidir con APP_VERSION de abajo
    var vGuardada = parseInt(localStorage.getItem('leoyjuego-html-version')||'0',10);
    var htmlGuardado = localStorage.getItem('leoyjuego-html');
    // Si esta página YA es la versión nueva cargada vía blob, no volver a aplicar.
    var yaEsBlob = (location.protocol === 'blob:') || sessionStorage.getItem('__leoActualizado');
    if(htmlGuardado && vGuardada>V_ACTUAL && !window.__yaAplicado && !yaEsBlob){
      window.__yaAplicado = true;
      window.__actualizando = true;      // que no arranque la app vieja
      if(window.stop) try{ window.stop(); }catch(e){}
      sessionStorage.setItem('__leoActualizado','1');
      var blob = new Blob([htmlGuardado], {type:'text/html'});
      var url = URL.createObjectURL(blob);
      location.replace(url);             // navega a la versión nueva, contexto limpio
    } else {
      // arrancó la versión definitiva: limpiar la marca para futuras actualizaciones
      sessionStorage.removeItem('__leoActualizado');
    }
  }catch(e){}
})();
</script>
<style>
/* ====== TOKENS DE DISEÑO ======
   Paleta "patio de escuela argentino": celeste bandera, sol, pasto, tiza.
   No es el cream-serif-terracota genérico: es brillante, infantil, contrastado. */
:root{
  --cielo:#3aa7ff;        /* celeste bandera */
  --cielo-hondo:#1f6fd6;
  --sol:#ffcf3f;          /* amarillo sol */
  --sol-hondo:#f5a623;
  --pasto:#3ec96f;        /* verde */
  --pasto-hondo:#2aa856;
  --coral:#ff6b6b;        /* rojo suave para errores/acento */
  --uva:#9b6cff;          /* violeta juego */
  --tiza:#fffdf6;         /* blanco tiza */
  --pizarron:#264653;     /* texto oscuro */
  --sombra:0 6px 0 rgba(0,0,0,.18);
  --redondo:26px;
  --fuente-display:'Baloo 2','Comic Sans MS',system-ui,sans-serif;
  --fuente-cuerpo:'Nunito',system-ui,sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap');

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{margin:0;height:100%;height:100dvh;overflow:hidden}
body{
  font-family:var(--fuente-cuerpo);
  color:var(--pizarron);
  background:linear-gradient(180deg,var(--cielo) 0%,#8ed0ff 60%,var(--pasto) 100%);
  background-attachment:fixed;
  overflow:hidden;
  position:fixed;width:100%;
  user-select:none;-webkit-user-select:none;
}
/* Alto de la ventana. Usamos 100dvh (dynamic viewport height): en el WebView de
   Android respeta correctamente la barra de estado y la de navegación del sistema,
   a diferencia de medir innerHeight por JS (que en muchos dispositivos mide de MÁS
   y dejaba un vacío scrolleable abajo en TODAS las pantallas). El --alto-real
   medido por JS queda solo como respaldo para WebViews viejos sin soporte de dvh. */
#app{max-width:560px;margin:0 auto;display:flex;flex-direction:column;height:var(--alto-real,100vh);height:100dvh;max-height:100dvh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);box-sizing:border-box;overflow:hidden}
#pantalla{flex:1;min-height:0;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
#pantalla>.menu-grid{align-content:start}

/* ====== TIPOGRAFÍA / TÍTULOS ====== */
h1,h2,h3,.btn-grande,.letra-grande{font-family:var(--fuente-display)}
.titulo{font-size:2rem;text-align:center;color:var(--tiza);text-shadow:0 3px 0 rgba(0,0,0,.2);margin:10px 0}

/* ====== BARRA SUPERIOR ====== */
.topbar{display:flex;align-items:center;gap:10px;padding:14px;background:linear-gradient(135deg,var(--cielo-hondo),var(--uva));box-shadow:0 3px 12px rgba(0,0,0,.2);position:relative;z-index:5}
.topbar .titulo-app{font-family:var(--fuente-display);color:var(--sol);font-size:2rem;letter-spacing:.5px;text-shadow:0 2px 0 rgba(0,0,0,.25),0 3px 8px rgba(0,0,0,.3);flex:1;text-align:center;line-height:1}
.topbar .volver{background:var(--tiza);border:none;border-radius:50%;width:48px;height:48px;font-size:1.5rem;box-shadow:var(--sombra);cursor:pointer}
.topbar .estrellas{background:var(--sol);color:var(--pizarron);font-weight:800;border-radius:50px;padding:8px 16px;box-shadow:var(--sombra);font-size:1.1rem}

/* ====== BOTONES GRANDES MENÚ ====== */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px;padding-bottom:80px}
.btn-grande{
  border:none;border-radius:var(--redondo);padding:22px 10px;font-size:1.15rem;font-weight:800;
  color:#fff;box-shadow:var(--sombra);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:8px;transition:transform .08s;line-height:1.1;text-align:center;
  position:relative;overflow:hidden;text-shadow:0 2px 3px rgba(0,0,0,.22);
}
/* brillo superior tipo caramelo, hace los botones más vivos y atractivos */
.btn-grande::before{content:"";position:absolute;top:0;left:0;right:0;height:42%;
  background:linear-gradient(180deg,rgba(255,255,255,.38),rgba(255,255,255,0));
  border-radius:var(--redondo) var(--redondo) 50% 50%/var(--redondo) var(--redondo) 22px 22px;pointer-events:none}
.btn-grande .emo{font-size:2.6rem;position:relative;filter:drop-shadow(0 2px 2px rgba(0,0,0,.18))}
.btn-grande:active{transform:translateY(3px) scale(.98);box-shadow:0 3px 0 rgba(0,0,0,.18)}
/* Degradados vibrantes por color (mismos nombres de clase, no rompe nada) */
.c-cielo{background:linear-gradient(155deg,#5bb8ff,#1f6fd6)}
.c-sol{background:linear-gradient(155deg,#ffe14d,#f5932a);color:#5a3d00;text-shadow:0 1px 1px rgba(255,255,255,.4)}
.c-pasto{background:linear-gradient(155deg,#5fe08a,#1f9d4d)}
.c-coral{background:linear-gradient(155deg,#ff8e8e,#ef4f4f)}
.c-uva{background:linear-gradient(155deg,#b98cff,#7c43e8)}
.c-pizarron{background:linear-gradient(155deg,#3d6575,#1d3a45)}

/* ====== TARJETA DE ACTIVIDAD ====== */
.escena{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:18px;text-align:center}
.tarjeta{background:var(--tiza);border-radius:var(--redondo);box-shadow:var(--sombra);padding:24px;width:100%;max-width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;overflow:hidden}
.letra-grande{font-size:6rem;line-height:1;color:var(--cielo-hondo)}
.consigna{font-size:1.3rem;font-weight:800;color:var(--pizarron)}
.fila-emoji{display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
.opcion-img{font-size:3.4rem;background:#fff;border:4px solid #eee;border-radius:20px;width:96px;height:96px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sombra);transition:transform .08s}
.opcion-img:active{transform:scale(.94)}
.opcion-color{width:96px;height:96px;border-radius:20px;border:4px solid rgba(0,0,0,.12);cursor:pointer;box-shadow:var(--sombra);transition:transform .08s}
.opcion-color:active{transform:scale(.94)}
.paleta{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;background:#f4f8ff;border-radius:16px;padding:10px}
.color-pincel{width:40px;height:40px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 4px rgba(0,0,0,.2);cursor:pointer;transition:transform .1s}
.color-pincel.sel{transform:scale(1.25);border-color:var(--pizarron)}
.opcion-txt{font-family:var(--fuente-display);font-size:2rem;background:var(--sol);color:var(--pizarron);border:none;border-radius:18px;padding:14px 26px;cursor:pointer;box-shadow:var(--sombra);min-width:90px}
.opcion-txt:active{transform:translateY(3px)}
.correcto{background:var(--pasto)!important;border-color:var(--pasto-hondo)!important}
.incorrecto{background:var(--coral)!important;border-color:#d64545!important;animation:tiembla .3s}
.pista{border-color:var(--sol)!important;background:#fff7d6!important;animation:latido .9s}
@keyframes tiembla{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.btn-sonido{background:var(--uva);color:#fff;border:none;border-radius:50px;padding:14px 26px;font-size:1.2rem;font-weight:800;font-family:var(--fuente-display);box-shadow:var(--sombra);cursor:pointer}
.btn-sonido:active{transform:translateY(3px)}

/* ====== MASCOTA ====== */
#mascota{position:fixed;bottom:14px;right:14px;z-index:50;text-align:center;cursor:pointer;transition:transform .2s}
#mascota .cara{font-size:3rem;filter:drop-shadow(0 4px 0 rgba(0,0,0,.15))}
#mascota.salta{animation:salta .5s}
@keyframes salta{0%,100%{transform:translateY(0)}40%{transform:translateY(-24px) rotate(-8deg)}}
.globo-msj{position:fixed;bottom:80px;right:14px;background:var(--tiza);border-radius:18px;padding:10px 16px;font-weight:800;box-shadow:var(--sombra);z-index:50;max-width:200px;font-size:.95rem;display:none}

/* ====== PROGRESO / MUNDOS ====== */
.mundos{display:flex;flex-direction:column;gap:12px;padding:14px}
.mundo{background:var(--tiza);border-radius:var(--redondo);padding:16px;display:flex;align-items:center;gap:14px;box-shadow:var(--sombra);cursor:pointer}
.mundo .ico{font-size:2.2rem}
.mundo .barra{flex:1}
.mundo h3{font-size:1.1rem}
.progbar{height:14px;background:#e6e6e6;border-radius:50px;overflow:hidden;margin-top:6px}
.progbar i{display:block;height:100%;background:linear-gradient(90deg,var(--pasto),var(--pasto-hondo))}
.bloqueado{opacity:.5}

/* ====== FORM PERFIL / PADRES ====== */
.form{background:var(--tiza);border-radius:var(--redondo);padding:22px;box-shadow:var(--sombra);display:flex;flex-direction:column;gap:14px;margin:14px}
.form label{font-weight:800;font-size:1rem}
.form input,.form select{font-family:var(--fuente-cuerpo);font-size:1.2rem;padding:14px;border:3px solid var(--cielo);border-radius:16px;font-weight:700}
.form .opciones-grado{display:flex;gap:8px;flex-wrap:wrap}
.chip{flex:1;min-width:70px;text-align:center;padding:12px;border-radius:14px;background:#eef;border:3px solid transparent;font-weight:800;cursor:pointer}
.chip.sel{background:var(--cielo);color:#fff;border-color:var(--cielo-hondo)}

/* ====== LOGROS ====== */
.medallas{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:14px}
.medalla{background:var(--tiza);border-radius:20px;padding:14px;text-align:center;box-shadow:var(--sombra)}
.medalla .ico{font-size:2.4rem}
.medalla.gris{filter:grayscale(1);opacity:.45}
.medalla small{display:block;font-weight:800;margin-top:6px;font-size:.78rem}

/* ====== JUEGOS ====== */
.memo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:100%}
.memo-grid.g3{grid-template-columns:repeat(3,1fr)}
.memo-grid.g4{grid-template-columns:repeat(4,1fr)}
.carta{aspect-ratio:1;background:var(--cielo-hondo);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-family:var(--fuente-display);color:transparent;cursor:pointer;box-shadow:var(--sombra);overflow:hidden;min-width:0;padding:2px;text-align:center}
.carta .contenido{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:.95rem;line-height:1;word-break:break-word;overflow:hidden}
.carta .contenido img,.carta .contenido span{max-width:100%;max-height:100%}
.carta.abierta{background:var(--tiza);color:var(--pizarron)}
.carta.hecha{background:var(--pasto);color:#fff;cursor:default}
.memo-pal{font-family:var(--fuente-display);font-size:clamp(.6rem,3.2vw,1.1rem);line-height:1;display:block;width:100%;text-align:center;overflow-wrap:break-word;hyphens:auto}
#globos-zona{position:relative;width:100%;height:60vh;overflow:hidden;background:rgba(255,255,255,.25);border-radius:var(--redondo)}
.globo{position:absolute;bottom:-90px;width:72px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fuente-display);font-size:1.8rem;color:#fff;cursor:pointer;box-shadow:var(--sombra)}
.pista{display:flex;gap:10px;align-items:center;justify-content:center;margin-bottom:8px;font-weight:800}
.casillas{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.casilla{width:54px;height:54px;border:3px dashed var(--cielo);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--fuente-display);font-size:1.8rem;background:#fff}
.letras-pool{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.ficha{width:54px;height:54px;background:var(--sol);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--fuente-display);font-size:1.8rem;cursor:pointer;box-shadow:var(--sombra)}

.fab-leer{background:var(--coral);color:#fff;border:none;border-radius:50px;padding:16px 30px;font-size:1.4rem;font-weight:800;font-family:var(--fuente-display);box-shadow:var(--sombra);cursor:pointer;margin-top:6px}
.frase-leer{font-family:var(--fuente-display);font-size:2rem;color:var(--cielo-hondo);line-height:1.3}
.dato{display:flex;justify-content:space-between;padding:12px 0;border-bottom:2px dashed #ddd;font-weight:700}
.lista-fallos{display:flex;flex-wrap:wrap;gap:8px}
.tag{background:var(--coral);color:#fff;padding:6px 14px;border-radius:50px;font-weight:800}
.confeti{position:fixed;top:-20px;width:12px;height:12px;z-index:80;pointer-events:none}
.oculto{display:none!important}

/* ====== MÓDULO NÚMEROS ====== */
.num-cuenta{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;background:linear-gradient(135deg,#eaf3ff,#f3ecff);border-radius:18px;padding:14px;width:100%;min-height:80px}
.num-grupo{font-size:1.8rem;line-height:1.1;max-width:130px;text-align:center}
.num-signo{font-family:var(--fuente-display);font-size:2.2rem;color:var(--uva);font-weight:800}
.tachado{position:relative;opacity:.45}
.tachado::after{content:"";position:absolute;left:0;top:50%;width:100%;height:5px;background:var(--coral);transform:rotate(-8deg);border-radius:3px}
.num-opciones{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.num-op{background:#fff;border:3px solid #eee;border-radius:18px;padding:10px;cursor:pointer;box-shadow:var(--sombra);display:flex;flex-direction:column;align-items:center;gap:4px;min-width:88px;transition:transform .1s}
.num-op:active{transform:scale(.93)}
.num-op-imgs{font-size:1.1rem;line-height:1.1;max-width:96px;text-align:center;word-break:break-all}
.num-op-cifra{font-family:var(--fuente-display);font-size:2rem;color:var(--cielo-hondo)}
.num-op.correcto{background:var(--pasto);border-color:var(--pasto-hondo)}
.num-op.correcto .num-op-cifra{color:#fff}
.num-op.incorrecto{background:var(--coral);border-color:#d64545;animation:tiembla .3s}
.num-cifra-grande{font-family:var(--fuente-display);font-size:3rem;color:var(--cielo-hondo);line-height:1}
/* ====== CONTAR CON DEDITOS (números con manos) ====== */
.cuenta-dedos{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.grupo-dedos{display:flex;flex-direction:column;align-items:center;gap:4px;background:#fff;border-radius:16px;padding:10px 8px;box-shadow:var(--sombra);min-width:64px}
.grupo-dedos.resta{background:#ffeaea}
.num-dedos{font-family:var(--fuente-display);font-size:1.8rem;color:var(--cielo-hondo);line-height:1}
.grupo-dedos.resta .num-dedos{color:var(--coral)}
.deditos{font-size:1.6rem;line-height:1.1;max-width:120px;word-break:break-word}
/* ====== RECTA NUMÉRICA (saltos) ====== */
.recta-wrap{width:100%;overflow-x:auto;padding:8px 2px 4px;-webkit-overflow-scrolling:touch}
.recta{position:relative;display:flex;align-items:flex-end;gap:0;min-width:max-content;margin:0 auto;padding-top:54px}
.recta .nodo{position:relative;width:46px;flex:0 0 46px;display:flex;flex-direction:column;align-items:center}
.recta .linea{position:absolute;top:78px;left:23px;right:0;height:6px;background:var(--cielo);border-radius:3px;z-index:0}
.recta .punto{width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid var(--cielo);z-index:1;display:flex;align-items:center;justify-content:center}
.recta .punto.ini{border-color:var(--uva);background:var(--uva)}
.recta .punto.fin{border-color:var(--pasto);background:var(--pasto)}
.recta .etq{font-family:var(--fuente-display);font-size:1.2rem;color:var(--pizarron);margin-top:6px}
.recta .rana{position:absolute;top:0;font-size:2rem;transition:left .45s cubic-bezier(.34,1.4,.5,1);z-index:3;transform:translateX(-50%)}
.recta .arco{position:absolute;top:34px;height:36px;border-top:4px dashed var(--coral);border-radius:50%/100% 100% 0 0;z-index:2;pointer-events:none;opacity:0;transition:opacity .3s}
.recta .arco.ver{opacity:1}
.recta.resta .arco{border-color:var(--coral)}
.recta.suma .arco{border-color:var(--pasto-hondo)}
.cuenta-grande{font-family:var(--fuente-display);font-size:2.6rem;color:var(--cielo-hondo);display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.cuenta-grande .op-suma{color:var(--pasto-hondo)}
.cuenta-grande .op-resta{color:var(--coral)}
/* ====== COMPARAR CANTIDADES ====== */
.comp-fila{display:flex;align-items:stretch;justify-content:center;gap:12px;width:100%}
.comp-grupo{flex:1;background:linear-gradient(135deg,#eaf3ff,#f3ecff);border-radius:18px;padding:14px 8px;font-size:1.7rem;line-height:1.3;word-break:break-word;cursor:pointer;border:4px solid transparent;transition:transform .1s;display:flex;align-items:center;justify-content:center;min-height:96px}
.comp-grupo:active{transform:scale(.95)}
.comp-grupo.correcto{background:var(--pasto);border-color:var(--pasto-hondo)}
.comp-grupo.incorrecto{background:var(--coral);border-color:#d64545;animation:tiembla .3s}
.comp-vs{font-family:var(--fuente-display);font-size:2.2rem;color:var(--uva);align-self:center}
/* ====== NÚMERO QUE FALTA ====== */
.faltan-fila{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;background:linear-gradient(135deg,#eaf3ff,#f3ecff);border-radius:18px;padding:16px;width:100%}
.faltan-cel{font-family:var(--fuente-display);font-size:2.2rem;color:var(--cielo-hondo);min-width:46px;text-align:center}
.faltan-cel.hueco{color:var(--uva);border-bottom:5px solid var(--uva)}
/* ====== SIMÓN / MEMORIA DE LUCES ====== */
.simon-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:320px;margin:0 auto}
.simon-pad{aspect-ratio:1;border-radius:22px;cursor:pointer;opacity:.55;transition:opacity .15s,transform .1s;box-shadow:var(--sombra);border:none}
.simon-pad.on{opacity:1;transform:scale(1.05)}
.simon-pad:active{transform:scale(.96)}
.simon-rojo{background:#ff6b6b}.simon-verde{background:#51cf66}.simon-azul{background:#4dabf7}.simon-amarillo{background:#ffd43b}
.simon-nivel{font-family:var(--fuente-display);font-size:1.4rem;color:#fff;font-weight:800}
/* ====== PARTE DEL DÍA ====== */
.dia-escena{font-size:5rem;line-height:1;margin:6px 0}
.dia-ops{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.dia-op{background:#fff;border:3px solid #eee;border-radius:18px;padding:14px 18px;cursor:pointer;box-shadow:var(--sombra);font-family:var(--fuente-display);font-size:1.3rem;color:var(--pizarron);display:flex;flex-direction:column;align-items:center;gap:4px;min-width:96px;transition:transform .1s}
.dia-op:active{transform:scale(.94)}
.dia-op .dia-emo{font-size:2rem}
.dia-op.correcto{background:var(--pasto);border-color:var(--pasto-hondo);color:#fff}
.dia-op.incorrecto{background:var(--coral);border-color:#d64545;animation:tiembla .3s}
.signo-dedos{font-family:var(--fuente-display);font-size:2rem;color:var(--uva);line-height:1}
/* ====== SECUENCIAS ====== */
.secuencia{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center;background:#f4f8ff;border-radius:18px;padding:14px;width:100%}
.sec-item{font-size:2.4rem;line-height:1}
.sec-vacio{background:#fff;border:3px dashed var(--cielo);border-radius:12px;width:50px;height:50px;display:flex;align-items:center;justify-content:center}

/* ====== RUTINA VISUAL (pictogramas) ====== */
.rutina-lista{display:flex;flex-direction:column;gap:10px;width:100%}
.rutina-paso{display:flex;align-items:center;gap:14px;background:var(--tiza);border-radius:18px;padding:12px 14px;box-shadow:var(--sombra);cursor:pointer;transition:transform .1s;border:3px solid transparent}
.rutina-paso:active{transform:scale(.98)}
.rutina-paso .pic{font-size:2.4rem;line-height:1}
.rutina-paso .nom{flex:1;font-family:var(--fuente-display);font-size:1.2rem;color:var(--pizarron)}
.rutina-paso .check{font-size:1.6rem;width:36px;height:36px;border-radius:50%;border:3px solid #ddd;display:flex;align-items:center;justify-content:center;color:transparent}
.rutina-paso.hecho{border-color:var(--pasto);background:#eefaf0}
.rutina-paso.hecho .nom{text-decoration:line-through;color:#9bb}
.rutina-paso.hecho .check{border-color:var(--pasto);background:var(--pasto);color:#fff}
.rutina-paso.actual{border-color:var(--cielo);background:#eef6ff}
body.calma .rutina-paso.hecho{background:#eef3f0}
body.calma .rutina-paso.actual{background:#eef1f4}

/* ====== TEMPORIZADOR VISUAL (reloj de arena / barra que se vacía) ====== */
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%}
.timer-circulo{position:relative;width:200px;height:200px}
.timer-circulo svg{transform:rotate(-90deg)}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fuente-display);font-size:3.4rem;color:var(--cielo-hondo)}
.timer-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.timer-preset{background:var(--sol);border:none;border-radius:16px;padding:14px 20px;font-family:var(--fuente-display);font-size:1.2rem;box-shadow:var(--sombra);cursor:pointer;color:var(--pizarron)}
.timer-preset:active{transform:translateY(3px)}
.timer-preset.sel{background:var(--cielo);color:#fff}
body.calma .timer-circulo svg .barra-activa{stroke:#9ccfae !important}

/* ====== PIN ZONA PADRES ====== */
.pin-puntos{display:flex;gap:18px;justify-content:center;margin:10px 0}
.pin-pt{width:22px;height:22px;border-radius:50%;border:3px solid var(--cielo);background:#fff;transition:background .15s}
.pin-pt.lleno{background:var(--cielo-hondo);border-color:var(--cielo-hondo)}
.pin-puntos.pin-error{animation:tiembla .4s}
.pin-puntos.pin-error .pin-pt{border-color:var(--coral)}
.teclado-num{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px;margin:0 auto}
.tecla-num{aspect-ratio:1.4;background:#fff;border:3px solid #e6e6e6;border-radius:16px;font-family:var(--fuente-display);font-size:1.8rem;color:var(--pizarron);cursor:pointer;box-shadow:var(--sombra)}
.tecla-num:active{transform:translateY(3px);background:#f4f8ff}
/* ====== MÓDULO FONÉTICO (grafismos estilo libro) ====== */
.sil-grid{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;width:100%;padding:6px 0}
.sil-col{display:flex;flex-direction:column;gap:10px;align-items:center}
.sil-celda{border:none;background:#fff;border-radius:16px;padding:6px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;box-shadow:var(--sombra);cursor:pointer;min-width:72px;transition:transform .12s}
.sil-celda:active,.sil-celda.toco{transform:scale(.9);background:#fff7e0}
.sil-txt{font-family:var(--fuente-display);font-size:1.5rem;color:var(--pizarron)}
.armado{margin-top:14px;background:#f4f8ff;border-radius:18px;padding:14px;width:100%;display:flex;flex-direction:column;align-items:center;gap:8px}
.armado-formas{display:flex;gap:6px;justify-content:center}
.armado-pal{display:flex;gap:2px;font-family:var(--fuente-display);font-size:2.6rem}
.armado-pal .ap{color:#ccc;transition:color .3s,transform .3s}
.armado-pal .ap[data-on="1"]{color:var(--cielo-hondo);transform:scale(1.12)}
.armado-img{margin-top:6px;animation:latido .5s}
@keyframes latido{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.btn-grafismo{background:var(--sol-hondo);color:#fff;border:none;border-radius:50px;padding:12px 22px;font-family:var(--fuente-display);font-size:1.1rem;box-shadow:var(--sombra);cursor:pointer}
.btn-grafismo:active{transform:translateY(3px)}

/* ====== MODO CALMA (baja estimulación sensorial, para TEA) ====== */
body.calma{ background:#eef3f7 !important; }
body.calma #app{ }
body.calma .titulo{ color:#345 !important; text-shadow:none !important; }
body.calma .topbar span{ color:#345 !important; }
body.calma .btn-grande{ box-shadow:0 3px 0 rgba(0,0,0,.10) !important; }
body.calma .c-cielo{background:#6aa6d8 !important} body.calma .c-sol{background:#cdb15e !important}
body.calma .c-pasto{background:#7bbd91 !important} body.calma .c-coral{background:#d89a9a !important}
body.calma .c-uva{background:#a99bc9 !important} body.calma .c-pizarron{background:#7d8a93 !important}
body.calma .confeti{ display:none !important; }
body.calma *{ animation-duration:.001s !important; }
body.calma .correcto{ background:#9ccfae !important; }
body.calma .incorrecto{ background:#e0bcbc !important; animation:none !important; }
body.calma #mascota .cara{ filter:none; }
/* botón flotante de calma siempre accesible */
#btnCalma{position:fixed;bottom:14px;left:14px;z-index:50;background:var(--tiza);border:none;border-radius:50%;width:48px;height:48px;font-size:1.4rem;box-shadow:var(--sombra);cursor:pointer}
body.calma #btnCalma{background:#cfe0ec}

/* CORRECCIÓN DE SÍLABAS para el motor de voz.
   El TTS de baja calidad lee mal sílabas sueltas (be->bi, deletrea lle).
   No hay una reescritura mágica universal, así que esta tabla arranca vacía:
   las correcciones reales las define el padre desde el "Probador de sílabas"
   (Zona Padres), o mejor aún, graba la sílaba con su voz.
   Recomendado: instalar las voces de Google (Ajustes -> Texto a voz). */
/* CORRECCIÓN DE SÍLABAS para el motor de voz.
   Algunos motores deletrean ciertos dígrafos (lle -> l-l-e) aunque lean bien el
   resto. Acá reescribimos SOLO esos casos con un sonido equivalente que el motor
   sí dice seguido. En español "ll" e "y" suenan igual (rioplatense), así que
   "lle"->"ye". Empezamos solo con los que suelen fallar; el padre puede agregar
   o cambiar cualquiera desde "Probador de sílabas" (Zona Padres). */
const CORRECCION_SILABA = {
  'lle':'ye',   // el motor suele deletrear "lle" -> usamos "ye" (mismo sonido)
  'lli':'yi'
};

/* GRAFISMOS FONÉTICOS (estilo del libro de la imagen):
   - la FORMA representa la consonante
   - el COLOR representa la vocal */
const FORMA_CONS = { // forma de cada consonante
  M:'arco', P:'circulo', T:'triangulo', S:'onda', L:'arco',
  N:'arco', D:'circulo', C:'triangulo', R:'onda', F:'triangulo',
  B:'triangulo', G:'circulo'
};
const COLOR_VOC = { A:'#e23b3b', E:'#3ec96f', I:'#f5c722', O:'#3aa7ff', U:'#8a8a8a' };
// dibuja la forma de una sílaba (consonante=forma, vocal=color) como SVG
function formaSilaba(cons, voc, tam=64){
  const color=COLOR_VOC[voc]||'#e23b3b';
  const forma=FORMA_CONS[cons]||'circulo';
  const s=tam, h=s/2;
  let fig='';
  if(forma==='circulo') fig=`<circle cx="${h}" cy="${h}" r="${h*0.7}" fill="${color}"/>`;
  else if(forma==='triangulo') fig=`<polygon points="${h},${s*0.12} ${s*0.85},${s*0.85} ${s*0.15},${s*0.85}" fill="${color}"/>`;
  else if(forma==='arco') fig=`<path d="M${s*0.12} ${s*0.72} A ${h*0.78} ${h*0.78} 0 0 1 ${s*0.88} ${s*0.72}" fill="none" stroke="${color}" stroke-width="${s*0.16}" stroke-linecap="round"/>`;
  else if(forma==='onda') fig=`<path d="M${s*0.1} ${h} Q ${s*0.3} ${s*0.2}, ${h} ${h} T ${s*0.9} ${h}" fill="none" stroke="${color}" stroke-width="${s*0.15}" stroke-linecap="round"/>`;
  return `<svg viewBox="0 0 ${s} ${s}" width="${tam}" height="${tam}" style="display:block">${fig}</svg>`;
}

  data:{ nombre:'', edad:6, grado:'1°', estrellas:0, mundos:{}, fallos:{}, tiempo:0, mascota:'🐶', voz:'', pinPadres:'', modoFonico:'aleatorio', ajustesSilaba:{}, vozLang:'es-US', racha:0, rachaMax:0, ultimoDia:'' },
  cargar(){ try{ const s=localStorage.getItem('leoyjuego'); if(s) this.data=JSON.parse(s);}catch(e){} },
  guardar(){ localStorage.setItem('leoyjuego', JSON.stringify(this.data)); },
  sumarEstrella(n=1){ this.data.estrellas+=n; this.guardar(); UI.refrescarEstrellas(); },
  avanzarMundo(id,pct){ const m=this.data.mundos[id]||0; if(pct>m) this.data.mundos[id]=pct; this.guardar(); },
  registrarFallo(clave){ this.data.fallos[clave]=(this.data.fallos[clave]||0)+1; this.guardar(); },
  registrarVisita(){
    // Cuenta días seguidos que se abre la app. No depende de la hora, solo de la fecha.
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const hoyTxt = hoy.toISOString().slice(0,10);
    if(this.data.ultimoDia === hoyTxt) return; // ya contado hoy
    if(this.data.ultimoDia){
      const ant = new Date(this.data.ultimoDia+'T00:00:00');
      const difDias = Math.round((hoy - ant)/86400000);
      if(difDias === 1) this.data.racha = (this.data.racha||0) + 1; // día siguiente: sigue la racha
      else this.data.racha = 1; // se cortó: vuelve a empezar
    } else {
      this.data.racha = 1; // primer día
    }
    if(this.data.racha > (this.data.rachaMax||0)) this.data.rachaMax = this.data.racha;
    this.data.ultimoDia = hoyTxt;
    this.guardar();
  },
};

/* ---------- NIVEL: dificultad según el grado del nene ----------
   Convierte el grado (Jardín..7°) en un "escalón" 0..4 y permite
   que cada juego pida valores distintos por grado. */
const Nivel = {
  // escalón 0=jardín, 1=1°/2°, 2=3°/4°, 3=5°/6°, 4=7°
  escalon(){
    const g=(Estado.data.grado||'1°');
    if(/jard/i.test(g)) return 0;
    const n=parseInt(g,10);
    if(isNaN(n)) return 1;
    if(n<=2) return 1;
    if(n<=4) return 2;
    if(n<=6) return 3;
    return 4;
  },
  // dado un objeto {jardin,g1,g2,g3,g7} devuelve el valor del escalón actual
  // (interpola los grados intermedios al valor más cercano hacia abajo)
  escala(map){
    const e=this.escalon();
    const orden=[map.jardin,map.g1,map.g2,map.g3,map.g7];
    // rellenar undefined con el anterior definido
    let last=orden.find(x=>x!=null);
    for(let i=0;i<orden.length;i++){ if(orden[i]==null) orden[i]=last; else last=orden[i]; }
    return orden[e];
  },
  // aciertos necesarios para terminar una ronda, sube con el grado
  metaRonda(base=5){ return base + this.escalon(); }
};

/* ---------- VOZ (Web Speech API) ---------- */
const Voz = {
  vozPref:null, lista:false,
  // Elegir la voz en español más natural disponible (prioriza Google/online)
  elegirVoz(){
    const vs=speechSynthesis.getVoices(); if(!vs.length) return null;
    this.lista=true;
    if(Estado.data&&Estado.data.voz){ const g=vs.find(v=>v.name===Estado.data.voz); if(g){ this.vozPref=g; return g; } }
    const es=vs.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('es'));
    const pref =
      es.find(v=>/google/i.test(v.name)&&/es-(ar|us|mx|419)/i.test(v.lang)) ||
      es.find(v=>/google|natural|neural|enhanced|premium/i.test(v.name)) ||
      es.find(v=>v.localService===false) ||
      es.find(v=>/es-AR/i.test(v.lang)) ||
      es[0] ||
      vs[0]; // último recurso: cualquier voz, para que al menos suene
    this.vozPref=pref||null; return this.vozPref;
  },
  _config(u,{rate=.9,pitch=1.15}={}){
    if(!this.vozPref) this.elegirVoz();
    const hayEs=this.vozPref&&/^es/i.test(this.vozPref.lang);
    u.lang=hayEs?this.vozPref.lang:'es-ES';
    u.rate=rate; u.pitch=pitch; u.volume=1;
    // si hay voz española, usarla; si no, usar la voz por defecto del sistema
    // (mejor que no se escuche nada, aunque suene con acento)
    if(hayEs) u.voice=this.vozPref;
    else if(this.vozPref) u.voice=this.vozPref;
  },
  hayVozEspanol(){ return speechSynthesis.getVoices().some(v=>v.lang&&v.lang.toLowerCase().startsWith('es')); },
  // "Despertar" el motor de voz con el primer toque (Android lo exige)
  despertar(){
    try{
      if(this._despierto) return; this._despierto=true;
      const u=new SpeechSynthesisUtterance(' '); u.volume=0; u.lang='es-US';
      speechSynthesis.speak(u);
      this.elegirVoz();
    }catch(e){}
  },
  // ¿está el plugin nativo de Capacitor disponible? (solo en la app, no en navegador)
  ttsNativo(){
    try{ return window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.TextToSpeech; }
    catch(e){ return null; }
  },
  hablar(texto,opts){
    const o=opts||{};
    // 1) En la app empaquetada: usar el motor nativo de Android (confiable)
    const TTS=this.ttsNativo();
    if(TTS){
      try{
        TTS.stop().catch(()=>{});
        TTS.speak({
          text:texto,
          lang:(Estado.data&&Estado.data.vozLang)||'es-US',
          rate:o.rate||1.0,
          pitch:o.pitch||1.1,
          volume:1.0,
          category:'playback'
        }).then(()=>{this._ultimoError='ok';}).catch(e=>{this._ultimoError='nativo:'+(e&&e.message||'err');});
        return;
      }catch(e){ this._ultimoError='nativo-excepcion'; }
    }
    // 2) En el navegador: Web Speech API
    try{
      if(!('speechSynthesis' in window)){ this._ultimoError='no-soporte'; return; }
      speechSynthesis.cancel();
      if(speechSynthesis.paused) speechSynthesis.resume();
      if(!this.vozPref) this.elegirVoz();
      const decir=()=>{
        const u=new SpeechSynthesisUtterance(texto); this._config(u,o);
        u.onerror=(e)=>{ this._ultimoError=(e&&e.error)||'error'; };
        u.onstart=()=>{ this._ultimoError='ok'; };
        speechSynthesis.speak(u);
      };
      if(!speechSynthesis.getVoices().length){
        let intentos=0;
        const t=setInterval(()=>{ intentos++;
          if(speechSynthesis.getVoices().length||intentos>10){ clearInterval(t); this.elegirVoz(); decir(); }
        },150);
      } else decir();
    }catch(e){ this._ultimoError='excepcion'; }
  },
  // SONIDO fonético de una letra (/mmm/, /sss/). Prioriza audio grabado.
  async sonidoLetra(letra){
    if(await Audios.reproducir(letra)) return;
    const reps={M:'mmmmm',N:'nnnnn',S:'ssssss',L:'lllll',R:'rrrrrr',F:'fffff',J:'jjjjj',
                A:'aaaaa',E:'eeeee',I:'iiiii',O:'ooooo',U:'uuuuu'};
    const s=reps[letra]||(SONIDO[letra]||letra.toLowerCase());
    this.hablar(s,{rate:.6,pitch:1.05});
  },
  // Al tocar una sílaba: dice la sílaba completa (ma, to, llo, cho...).
  // Recibe la sílaba COMPLETA para no romper dígrafos (LL, CH, RR, QU, GU).
  async deslizarSilaba(sil, _voc){
    // compatibilidad: si llega en 2 argumentos (forma vieja), unirlos
    if(_voc!==undefined) sil = String(sil)+String(_voc);
    sil = String(sil).toUpperCase();
    if(await Audios.reproducir(sil)) return;            // audio grabado de la sílaba completa
    // Solo si están grabados TANTO la consonante como la vocal sueltas, encadenarlos.
    // (Si falta alguno, mejor decir la sílaba entera y no partirla, para no romper RR/LL/CH.)
    const cons=sil.slice(0,-1), voc=sil.slice(-1);
    if(await Audios.tiene(cons) && await Audios.tiene(voc)){
      await Audios.reproducir(cons); await new Promise(r=>setTimeout(r,650));
      await Audios.reproducir(voc); await new Promise(r=>setTimeout(r,650));
      this.hablarSilaba(sil);
      return;
    }
    // caso normal: decir la sílaba entera, tal cual
    this.hablarSilaba(sil);
  },
  // Pronuncia una sílaba suelta. PRIORIDAD:
  // 1) audio grabado de la sílaba (lo mejor) 2) ajuste del padre 3) motor TTS.
  async hablarSilaba(sil){
    const sU=String(sil).toUpperCase();
    // 1) audio grabado con la voz del padre (a prueba de motores malos)
    if(await Audios.reproducir(sU)) return;
    const s=String(sil).toLowerCase();
    // 2) ajuste de texto definido por el padre (probador de sílabas)
    const ajustes=(Estado.data&&Estado.data.ajustesSilaba)||{};
    if(ajustes[s]!==undefined){
      // el padre definió algo: si tiene texto, usarlo; si lo dejó vacío, decir tal cual
      this.hablar(ajustes[s]||s,{rate:.85,pitch:1.05}); return;
    }
    // 3) corrección por defecto (lle->ye) o, si no hay, la sílaba tal cual
    const txt = CORRECCION_SILABA[s] || s;
    this.hablar(txt,{rate:.85,pitch:1.05});
  },
  // Dice una palabra completa. Si el padre la grabó, usa esa grabación.
  async decirPalabra(palabra, opts){
    const p=String(palabra).toUpperCase();
    if(await Audios.reproducir(p)) return;   // grabación del padre
    this.hablar(palabra, opts||{rate:.85});
  },
  // reconocimiento de voz (pronunciación)
  escuchar(objetivo, onResultado){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ onResultado(null,'sin-soporte'); return; }
    const r=new SR(); r.lang='es-AR'; r.maxAlternatives=3;
    r.onresult=e=>{
      const dicho=[...e.results[0]].map(x=>x.transcript.toUpperCase().trim());
      const ok=dicho.some(d=>d.includes(objetivo.toUpperCase()));
      onResultado(ok,dicho[0]);
    };
    r.onerror=()=>onResultado(null,'error');
    r.start();
  }
};

/* ---------- AUDIOS GRABADOS (IndexedDB) ----------
   Guarda audios que graba el papá/mamá. Clave = sonido (ej "M","MA","SOL").
   La app SIEMPRE intenta el audio grabado primero; si no hay, usa la voz. */
const Audios = {
  db:null,
  abrir(){ return new Promise(res=>{
    if(this.db) return res(this.db);
    const r=indexedDB.open('leoyjuego-audios',1);
    r.onupgradeneeded=e=>{ e.target.result.createObjectStore('sonidos'); };
    r.onsuccess=e=>{ this.db=e.target.result; res(this.db); };
    r.onerror=()=>res(null);
  });},
  async guardar(clave,blob){ const db=await this.abrir(); if(!db)return;
    return new Promise(res=>{ const tx=db.transaction('sonidos','readwrite');
      tx.objectStore('sonidos').put(blob,clave); tx.oncomplete=()=>res(true); tx.onerror=()=>res(false); });
  },
  async obtener(clave){ const db=await this.abrir(); if(!db)return null;
    return new Promise(res=>{ const tx=db.transaction('sonidos','readonly');
      const g=tx.objectStore('sonidos').get(clave); g.onsuccess=()=>res(g.result||null); g.onerror=()=>res(null); });
  },
  async borrar(clave){ const db=await this.abrir(); if(!db)return;
    return new Promise(res=>{ const tx=db.transaction('sonidos','readwrite');
      tx.objectStore('sonidos').delete(clave); tx.oncomplete=()=>res(true); });
  },
  async tiene(clave){ return !!(await this.obtener(clave)); },
  // reproduce un audio grabado; devuelve true si existía
  async reproducir(clave){
    const blob=await this.obtener(clave); if(!blob) return false;
    try{ const a=new Audio(URL.createObjectURL(blob)); await a.play(); return true; }catch(e){ return false; }
  }
};

/* Grabador de micrófono */
const Grabador = {
  rec:null, chunks:[], stream:null, ultimoError:'',
  async iniciar(){
    this.ultimoError='';
    // 1) En Capacitor, pedir el permiso de micrófono explícitamente si el plugin existe
    try{
      const Cap=window.Capacitor;
      if(Cap&&Cap.Plugins){
        // intentar con el plugin de micrófono o de permisos si está disponible
        const Mic=Cap.Plugins.Microphone||Cap.Plugins.VoiceRecorder;
        if(Mic&&Mic.requestPermissions){ try{ await Mic.requestPermissions(); }catch(e){} }
      }
    }catch(e){}
    // 2) Verificar que la API exista
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      this.ultimoError='no-api';
      throw new Error('Este dispositivo no permite grabar desde la app');
    }
    // 3) Pedir el micrófono
    try{
      this.stream=await navigator.mediaDevices.getUserMedia({audio:true});
    }catch(err){
      this.ultimoError=(err&&err.name)||'denegado';
      throw err;
    }
    if(!window.MediaRecorder){ this.ultimoError='no-recorder'; throw new Error('No hay grabador disponible'); }
    this.chunks=[];
    try{ this.rec=new MediaRecorder(this.stream); }
    catch(e){ this.rec=new MediaRecorder(this.stream,{mimeType:'audio/webm'}); }
    this.rec.ondataavailable=e=>{ if(e.data&&e.data.size>0) this.chunks.push(e.data); };
    this.rec.start();
  },
  detener(){ return new Promise(res=>{
    if(!this.rec){ res(null); return; }
    this.rec.onstop=()=>{ const blob=new Blob(this.chunks,{type:this.rec.mimeType||'audio/webm'});
      if(this.stream) this.stream.getTracks().forEach(t=>t.stop()); res(blob); };
    this.rec.stop();
  });},
  // mensaje claro según el error
  mensajeError(){
    switch(this.ultimoError){
      case 'NotAllowedError': case 'denegado': return 'Permiso de micrófono denegado. Activalo en Ajustes del celular → Aplicaciones → Leo y Juego → Permisos → Micrófono.';
      case 'NotFoundError': return 'No se encontró micrófono en el dispositivo.';
      case 'no-api': case 'no-recorder': return 'Esta versión de la app no puede grabar. Hay que habilitar el permiso de micrófono al compilar.';
      default: return 'No pude usar el micrófono. Revisá el permiso en Ajustes → Aplicaciones → Leo y Juego → Permisos.';
    }
  }
};

let _fonicoIdx=0, _fonicoOrden=[];
function modFonico(){
  const total=(Banco.data.silabeadas||[]).length;
  // El padre puede elegir "aleatorio" (por defecto) u "orden" en Zona Padres
  const modo = Estado.data.modoFonico || 'aleatorio';

  if(modo==='aleatorio') _fonicoOrden = UI.mezclar(_fonicoOrden);

function pasoFonico(){
  const lista=Banco.data.silabeadas;

  if(!_fonicoOrden.length || _fonicoOrden.length!==lista.length){ _fonicoOrden=Array.from({length:lista.length},(_,i)=>i); if((Estado.data.modoFonico||'aleatorio')==='aleatorio') _fonicoOrden=UI.mezclar(_fonicoOrden); }
  const item=lista[_fonicoOrden[_fonicoIdx%_fonicoOrden.length]];
  const sils=item.sil;
  // cada sílaba = una columna con su forma/color repetida 3 veces
  const columnas=sils.map((s,ci)=>{
    const cons=s[0], voc=s[1]||'A';
    const fig=formaSilaba(cons,voc,58);
    const filas=[0,1,2].map(()=>`

         ${fig}<span class="sil-txt">${s.toLowerCase()}</span>
       </button>`).join('');

       <div class="consigna">Tocá cada sílaba y repetí 👇</div>

  hidratarImgs();

/* ===================== MÓDULO NÚMEROS (sumar, restar, multiplicar) ===================== */
let _numIdx=0;
function modNumeros(){
  // pequeño menú: contar con objetos (lo de siempre) o con manos (dedos)
  P.innerHTML=`<h1 class="titulo">➕ Números</h1>
   <div class="menu-grid" style="padding-bottom:20px">
     <button class="btn-grande c-uva" onclick="modNumerosObjetos()"><span class="emo">🍎</span>Contar con<br>objetos</button>
     <button class="btn-grande c-coral" onclick="modManos()"><span class="emo">🖐️</span>Contar con<br>las manos</button>
     <button class="btn-grande c-pasto" onclick="modRecta()"><span class="emo">🐸</span>Saltos en la<br>recta (sumar/restar)</button>
     <button class="btn-grande c-sol" onclick="modComparar()"><span class="emo">⚖️</span>¿Cuál tiene<br>más?</button>
     <button class="btn-grande c-cielo" onclick="modFaltan()"><span class="emo">🔢</span>El número<br>que falta</button>
   </div>`;
}
function modNumerosObjetos(){ _numIdx=0; rondaNumero(); }
function rondaNumero(){
  const e=Nivel.escalon();
  const obj=UI.azar(Banco.data.contables);
  // Tipos de cuenta disponibles según el grado (más variedad = no se memoriza)
  let tipos=['suma','resta'];
  if(e>=1) tipos.push('suma','resta','doble');   // 1°-2°: dobles
  if(e>=2) tipos.push('suma','resta');           // 3°-4°: más mezcla
  if(e>=2) tipos.push('multi');                  // multiplicación desde 3°
  if(e>=3) tipos.push('multi','divi');           // división desde 5°
  if(e>=4) tipos.push('multi','divi');           // 7°: más nivel
  const tipo=UI.azar(tipos);

  // Topes de números por escalón (jardín..7°)
  const tope=[5,9,20,50,99][e];
  let a,b,resultado,signo,palabraOp,mostrarObjetos;

  if(tipo==='suma'){
    a=1+Math.floor(Math.random()*Math.min(tope,e===0?4:tope-1));
    b=1+Math.floor(Math.random()*Math.min(tope-a>0?tope-a:1, e===0?4:tope-1));
    resultado=a+b; signo='+'; palabraOp='más';
  }else if(tipo==='resta'){
    a=2+Math.floor(Math.random()*(tope-2>0?tope-2:1));
    b=1+Math.floor(Math.random()*(a-1));
    resultado=a-b; signo='−'; palabraOp='menos';
  }else if(tipo==='doble'){ // el doble de un número (a + a)
    const topD=[3,5,8,12,15][e]||5;
    a=1+Math.floor(Math.random()*topD); b=a;
    resultado=a+b; signo='+'; palabraOp='más';
  }else if(tipo==='divi'){ // división exacta (sin resto)
    const maxF=[0,0,0,9,12][e]||9;
    b=2+Math.floor(Math.random()*(maxF-1));        // divisor
    const coc=2+Math.floor(Math.random()*(maxF-1)); // cociente
    a=b*coc;                                        // dividendo
    resultado=coc; signo='÷'; palabraOp='dividido';
  }else{ // multiplicación
    const maxFactor=[0,0,5,9,12][e]||5;
    a=2+Math.floor(Math.random()*(maxFactor-1));
    b=2+Math.floor(Math.random()*(maxFactor-1));
    resultado=a*b; signo='×'; palabraOp='por';
  }
  // Mostrar objetos para contar solo en jardín/1°/2° y si los números son chicos
  mostrarObjetos = e<=2 && resultado<=12 && a<=9 && b<=9 && (tipo==='suma'||tipo==='resta'||tipo==='doble');
  const dispersion = e<=1?2:(e===2?4:Math.max(5,Math.round(resultado*0.3)));

  const opcionesSet=new Set([resultado]);
  let guard=0;
  while(opcionesSet.size<3 && guard++<50){
    let d=resultado+(Math.floor(Math.random()*(dispersion*2+1))-dispersion);
    if(d>=0 && d!==resultado) opcionesSet.add(d);
  }
  while(opcionesSet.size<3){ opcionesSet.add(resultado+opcionesSet.size); }
  const opciones=UI.mezclar([...opcionesSet]);
  const fila=n=>Array(n).fill(obj).join('');
  const tit = tipo==='suma'?'Sumá 🧮':tipo==='resta'?'Restá ✂️':tipo==='doble'?'El doble 🧮':tipo==='divi'?'Dividí ➗':'Multiplicá ✖️';

  P.innerHTML=`
   <div class="escena">
     <div class="tarjeta">
       <div class="consigna">${tit}</div>
       <div class="num-cuenta">
         ${mostrarObjetos
           ? `<span class="num-grupo">${fila(a)}</span>
              <span class="num-signo">${signo}</span>
              <span class="num-grupo">${tipo==='resta'?'<span class="tachado">'+fila(b)+'</span>':fila(b)}</span>
              <span class="num-signo">=</span><span class="num-signo">?</span>`
           : `<span class="num-cifra-grande">${a}</span>
              <span class="num-signo">${signo}</span>
              <span class="num-cifra-grande">${b}</span>
              <span class="num-signo">=</span><span class="num-signo">?</span>`}
       </div>
       <button class="btn-sonido" id="btnLeerCuenta">🔊 Escuchar</button>
       <div class="consigna" style="margin-top:6px">${mostrarObjetos?'¿Cuántos quedan? Contá y tocá 👇':'¿Cuánto da? Tocá 👇'}</div>
       <div class="num-opciones" id="numOps">
         ${opciones.map(o=>`<button class="num-op" data-ok="${o===resultado}" data-n="${o}">
             ${mostrarObjetos?`<span class="num-op-imgs">${fila(o)||'∅'}</span>`:''}
             <span class="num-op-cifra">${o}</span>
           </button>`).join('')}
       </div>
     </div>
   </div>`;

  const leer=()=>Voz.hablar(`${a} ${palabraOp} ${b}`);
  document.getElementById('btnLeerCuenta').onclick=leer;
  setTimeout(leer,500);

  document.getElementById('numOps').onclick=ev=>{
    const b2=ev.target.closest('.num-op'); if(!b2||b2.dataset.done)return;
    if(b2.dataset.ok==='true'){
      b2.dataset.done=1; b2.classList.add('correcto');
      Voz.hablar(`¡Muy bien! ${a} ${palabraOp} ${b} es igual a ${resultado}`);
      Estado.sumarEstrella(2); Mascota.festejar();
      _numIdx++;
      setTimeout(rondaNumero,1900);
    }else{
      b2.classList.add('incorrecto'); Estado.registrarFallo(tipo);
      Mascota.animar('No es '+b2.dataset.n+'. Probá de nuevo 👇');
      Voz.hablar('Esa no. Probá otra vez');
      setTimeout(()=>b2.classList.remove('incorrecto'),700);
    }
  };
}

/* ===================== NÚMEROS · CONTAR CON LAS MANOS =====================
   Muestra la cuenta con deditos para contar (debajo del 3 -> tres deditos).
   Suma en amarillo/azul; resta en rojo, para que el nene distinga la operación. */
function modManos(){ rondaManos(); }
// muestra N deditos: 0=puño, 2=la V (clara), el resto repite el dedito ☝️
function deditosEmoji(n){
  if(n<=0) return '✊';
  if(n===2) return '✌️';
  return '☝️'.repeat(n);
}
function rondaManos(){
  const e=Nivel.escalon();
  const esResta=Math.random()<0.45;
  let A,B,RES;
  if(!esResta){
    // suma con resultado hasta 10 (cabe en deditos), sube un poco con el grado
    const tope=Math.min(10, 5+e*2);
    RES=2+Math.floor(Math.random()*(tope-1));
    A=1+Math.floor(Math.random()*(RES-1)); B=RES-A;
  }else{
    A=2+Math.floor(Math.random()*8); B=1+Math.floor(Math.random()*(A-1)); RES=A-B;
  }
  const signo=esResta?'−':'+';
  const palabraOp=esResta?'menos':'más';
  const claseG=esResta?'grupo-dedos resta':'grupo-dedos';
  const titulo=esResta?'Sacá los deditos rojos ✋':'Contá todos los deditos 👇';
  // opciones (3): el resultado + 2 distractores cercanos
  const set=new Set([RES]); let guard=0;
  while(set.size<3 && guard++<40){ let d=RES+(Math.floor(Math.random()*5)-2); if(d>=0&&d!==RES)set.add(d); }
  while(set.size<3) set.add(RES+set.size);
  const ops=UI.mezclar([...set]);
  P.innerHTML=`
   <div class="escena" style="justify-content:flex-start;padding-top:6px">
     <div class="tarjeta" style="gap:12px">
       <div class="consigna">${titulo}</div>
       <div class="cuenta-dedos">
         <div class="${claseG}"><div class="num-dedos">${A}</div><div class="deditos">${deditosEmoji(A)}</div></div>
         <div class="signo-dedos" style="${esResta?'color:var(--coral)':''}">${signo}</div>
         <div class="${claseG}"><div class="num-dedos">${B}</div><div class="deditos">${deditosEmoji(B)}</div></div>
         <div class="signo-dedos">=</div>
         <div class="num-dedos" style="font-size:2.4rem">?</div>
       </div>
       <button class="btn-sonido" onclick="Voz.hablar('${A} ${palabraOp} ${B}')">🔊 Escuchar</button>
       <div class="consigna">¿Cuánto da?</div>
       <div class="num-opciones" id="opsManos">
         ${ops.map(o=>`<button class="num-op" data-ok="${o===RES}" data-n="${o}"><span class="num-op-cifra">${o}</span></button>`).join('')}
       </div>
     </div>
   </div>`;
  setTimeout(()=>Voz.hablar(`${A} ${palabraOp} ${B}`),400);
  document.getElementById('opsManos').onclick=ev=>{
    const b=ev.target.closest('.num-op'); if(!b||b.dataset.done)return;
    if(b.dataset.ok==='true'){
      b.dataset.done=1; b.classList.add('correcto');
      Voz.hablar(`¡Muy bien! ${A} ${palabraOp} ${B} es ${RES}`);
      Estado.sumarEstrella(2); Mascota.festejar();
      if(!(window.Calma&&Calma.activo)) Confeti.lanzar();
      setTimeout(rondaManos,1800);
    }else{
      b.classList.add('incorrecto'); Estado.registrarFallo(esResta?'resta manos':'suma manos');
      Mascota.animar('Contá los deditos otra vez 👆'); Voz.hablar('Esa no. Contá de nuevo');
      setTimeout(()=>b.classList.remove('incorrecto'),700);
    }
  };
}


/* ===================== NÚMEROS · RECTA NUMÉRICA (SALTOS) =====================
   Una rana salta sobre la recta del 0 al tope. Suma = salta hacia adelante,
   resta = salta hacia atrás. El nene VE por qué da ese resultado.
   Sigue la regla pedagógica: error inmediato, dice la respuesta, se queda
   en la misma cuenta hasta acertar. */
function modRecta(){ rondaRecta(); }
function rondaRecta(){
  const e=Nivel.escalon();
  const tope=[5,10,10,15,20][e];           // largo de la recta según grado
  const esResta=Math.random()<0.45;
  let A,B,RES;
  if(!esResta){
    A=Math.floor(Math.random()*(tope-1));            // 0..tope-1
    B=1+Math.floor(Math.random()*Math.min(5,tope-A)); // que no se pase del tope
    RES=A+B;
  }else{
    A=2+Math.floor(Math.random()*(tope-2));          // 2..tope
    B=1+Math.floor(Math.random()*Math.min(5,A));     // que no baje de 0
    RES=A-B;
  }
  const signo=esResta?'−':'+';
  const palabraOp=esResta?'menos':'más';
  const clseOp=esResta?'op-resta':'op-suma';
  const titulo=esResta? '🐸 La rana salta hacia atrás' : '🐸 La rana salta hacia adelante';

  // opciones (3): el resultado + 2 vecinos
  const set=new Set([RES]); let guard=0;
  while(set.size<3 && guard++<40){ let d=RES+(Math.floor(Math.random()*5)-2); if(d>=0&&d<=tope&&d!==RES)set.add(d); }
  while(set.size<3){ let d=RES+set.size; if(d<=tope)set.add(d); else set.add(Math.max(0,RES-set.size)); }
  const ops=UI.mezclar([...set]);

  // construir nodos de la recta
  let nodos='';
  for(let i=0;i<=tope;i++){
    const cls = i===A?'punto ini' : (i===RES?'':'punto'); // el fin se revela al acertar
    nodos+=`<div class="nodo"><div class="punto ${i===A?'ini':''}" data-i="${i}"></div><div class="etq">${i}</div></div>`;
  }

  P.innerHTML=`
   <div class="escena" style="justify-content:flex-start;padding-top:8px">
     <div class="tarjeta" style="gap:14px">
       <div class="consigna">${titulo}</div>
       <div class="cuenta-grande">
         <span>${A}</span><span class="${clseOp}">${signo}</span><span>${B}</span>
         <span style="color:var(--uva)">=</span><span style="color:var(--uva)">?</span>
       </div>
       <div class="recta-wrap">
         <div class="recta ${esResta?'resta':'suma'}" id="recta">
           <div class="linea"></div>
           ${nodos}
           <div class="rana" id="rana">🐸</div>
           <div class="arco" id="arco"></div>
         </div>
       </div>
       <button class="btn-sonido" id="btnSalto">▶️ Ver el salto</button>
       <div class="consigna">¿En qué número cae la rana?</div>
       <div class="num-opciones" id="opsRecta">
         ${ops.map(o=>`<button class="num-op" data-ok="${o===RES}" data-n="${o}"><span class="num-op-cifra">${o}</span></button>`).join('')}
       </div>
     </div>
   </div>`;

  const recta=document.getElementById('recta');
  const rana=document.getElementById('rana');
  const arco=document.getElementById('arco');
  const NODO=46; // ancho fijo de cada nodo (coincide con el CSS)
  const xDe=i=> i*NODO + 23; // centro del punto i
  // posición inicial de la rana sobre A
  const colocar=i=>{ rana.style.left=xDe(i)+'px'; };
  colocar(A);

  function animarSalto(){
    colocar(A);
    // dibujar el arco entre A y RES
    const izq=Math.min(A,RES), der=Math.max(A,RES);
    arco.style.left=xDe(izq)+'px';
    arco.style.width=(xDe(der)-xDe(izq))+'px';
    arco.classList.add('ver');
    Voz.hablar(`${A} ${palabraOp} ${B}`);
    setTimeout(()=>{ colocar(RES); }, 350);
  }
  document.getElementById('btnSalto').onclick=animarSalto;
  setTimeout(animarSalto,500);

  document.getElementById('opsRecta').onclick=ev=>{
    const b=ev.target.closest('.num-op'); if(!b||b.dataset.done)return;
    if(b.dataset.ok==='true'){
      b.dataset.done=1; b.classList.add('correcto');
      // marcar el punto final en verde
      const pf=recta.querySelector(`.punto[data-i="${RES}"]`); if(pf) pf.classList.add('fin');
      colocar(RES);
      Voz.hablar(`¡Muy bien! ${A} ${palabraOp} ${B} es igual a ${RES}`);
      Estado.sumarEstrella(2); Mascota.festejar();
      if(!(window.Calma&&Calma.activo)) Confeti.lanzar();
      setTimeout(rondaRecta,2000);
    }else{
      b.classList.add('incorrecto'); Estado.registrarFallo(esResta?'resta recta':'suma recta');
      Mascota.animar('Mirá el salto otra vez 🐸'); Voz.hablar(`Esa no. La respuesta es ${RES}. Probá de nuevo`);
      setTimeout(()=>b.classList.remove('incorrecto'),700);
      animarSalto();
    }
  };
}


/* ===================== NÚMEROS · COMPARAR CANTIDADES =====================
   Dos grupos de objetos. El nene toca el que tiene MÁS (o el que tiene MENOS).
   Trabaja el sentido del número, base previa a sumar/restar bien. */
function modComparar(){ rondaComparar(); }
function rondaComparar(){
  const e=Nivel.escalon();
  const tope=[5,7,9,12,15][e];
  const obj=UI.azar(Banco.data.contables);
  let a=1+Math.floor(Math.random()*tope), b=1+Math.floor(Math.random()*tope);
  while(a===b){ b=1+Math.floor(Math.random()*tope); }      // que nunca sean iguales
  const buscarMas=Math.random()<0.6;                       // a veces pide "menos"
  const ganadora = buscarMas ? (a>b?'A':'B') : (a<b?'A':'B');
  const titulo = buscarMas ? '👆 Tocá el grupo que tiene MÁS' : '👆 Tocá el grupo que tiene MENOS';
  const fila=n=>obj.repeat(n);

  P.innerHTML=`
   <div class="escena" style="justify-content:flex-start;padding-top:8px">
     <div class="tarjeta" style="gap:14px">
       <div class="consigna">${titulo}</div>
       <div class="comp-fila">
         <div class="comp-grupo" data-g="A" data-ok="${ganadora==='A'}">${fila(a)}</div>
         <div class="comp-vs">vs</div>
         <div class="comp-grupo" data-g="B" data-ok="${ganadora==='B'}">${fila(b)}</div>
       </div>
       <button class="btn-sonido" id="btnComp">🔊 Escuchar</button>
     </div>
   </div>`;

  const decir=()=>Voz.hablar(buscarMas?'¿Cuál tiene más?':'¿Cuál tiene menos?');
  document.getElementById('btnComp').onclick=decir;
  setTimeout(decir,450);

  P.querySelector('.comp-fila').onclick=ev=>{
    const g=ev.target.closest('.comp-grupo'); if(!g||g.dataset.done)return;
    if(g.dataset.ok==='true'){
      g.dataset.done=1; g.classList.add('correcto');
      Voz.hablar(`¡Muy bien! Ese grupo tiene ${g.dataset.g==='A'?a:b}`);
      Estado.sumarEstrella(); Mascota.festejar();
      if(!(window.Calma&&Calma.activo)) Confeti.lanzar();
      setTimeout(rondaComparar,1700);
    }else{
      g.classList.add('incorrecto'); Estado.registrarFallo('comparar');
      const cant=g.dataset.g==='A'?a:b;
      Mascota.animar('Contá de nuevo 👆'); Voz.hablar(`Ese tiene ${cant}. Mirá bien y probá otra vez`);
      setTimeout(()=>g.classList.remove('incorrecto'),700);
    }
  };
}

/* ===================== NÚMEROS · EL NÚMERO QUE FALTA =====================
   Una secuencia con un hueco: 3, 4, _, 6. El nene elige el que va.
   Trabaja la serie numérica (contar de a 1, y de a 2 en grados altos). */
function modFaltan(){ rondaFaltan(); }
function rondaFaltan(){
  const e=Nivel.escalon();
  const paso = e>=3 && Math.random()<0.5 ? 2 : 1;          // de a 2 en grados altos
  const largo=[4,4,5,5,5][e];
  const topeInicio=[6,10,15,30,50][e];
  const inicio=1+Math.floor(Math.random()*topeInicio);
  const serie=Array.from({length:largo},(_,i)=>inicio+i*paso);
  const hueco=1+Math.floor(Math.random()*(largo-2));        // nunca el primero ni el último
  const correcto=serie[hueco];

  // opciones: correcto + 2 vecinos
  const set=new Set([correcto]); let guard=0;
  while(set.size<3 && guard++<40){ let d=correcto+(Math.floor(Math.random()*5)-2)*paso; if(d>0&&d!==correcto)set.add(d); }
  while(set.size<3){ set.add(correcto+set.size*paso); }
  const ops=UI.mezclar([...set]);

  P.innerHTML=`
   <div class="escena" style="justify-content:flex-start;padding-top:8px">
     <div class="tarjeta" style="gap:16px">
       <div class="consigna">🔢 ¿Qué número falta?</div>
       <div class="faltan-fila">
         ${serie.map((n,i)=> i===hueco
           ? `<span class="faltan-cel hueco">?</span>`
           : `<span class="faltan-cel">${n}</span>`).join('<span style="color:#bbb">›</span>')}
       </div>
       <button class="btn-sonido" id="btnFaltan">🔊 Escuchar</button>
       <div class="consigna">Tocá el número que va 👇</div>
       <div class="num-opciones" id="opsFaltan">
         ${ops.map(o=>`<button class="num-op" data-ok="${o===correcto}" data-n="${o}"><span class="num-op-cifra">${o}</span></button>`).join('')}
       </div>
     </div>
   </div>`;

/* ===================== JUEGO · MEMORIA DE LUCES (tipo Simón) =====================
   Se ilumina una secuencia que el nene tiene que repetir tocando.
   Cada acierto agrega un paso. Trabaja atención y memoria de trabajo. */
const SIMON_PADS=[
  {id:0,cls:'simon-rojo',nota:'Do'},
  {id:1,cls:'simon-verde',nota:'Mi'},
  {id:2,cls:'simon-azul',nota:'Sol'},
  {id:3,cls:'simon-amarillo',nota:'La'},
];
let _simonSec=[], _simonPaso=0, _simonBloqueo=false, _simonNivel=0;
function juegoSimon(){
  _simonSec=[]; _simonNivel=0;
  P.innerHTML=`
   <div class="escena" style="justify-content:flex-start;padding-top:8px">
     <div class="tarjeta" style="gap:16px">
       <div class="consigna">🎵 Mirá y repetí la secuencia</div>
       <div class="simon-nivel" style="color:var(--pizarron)">Nivel <span id="simonN">1</span></div>
       <div class="simon-grid" id="simonGrid">
         ${SIMON_PADS.map(p=>`<button class="simon-pad ${p.cls}" data-id="${p.id}"></button>`).join('')}
       </div>
       <button class="btn-sonido" id="simonRep">▶️ Empezar</button>
     </div>
   </div>`;
  document.getElementById('simonRep').onclick=()=>{ if(!_simonBloqueo) simonAvanzar(); };
  document.getElementById('simonGrid').onclick=simonToque;
  setTimeout(simonAvanzar,600);
}
function simonBeep(id){
  const pad=document.querySelector(`.simon-pad[data-id="${id}"]`);
  if(!pad)return; pad.classList.add('on');
  try{ Voz.hablar(SIMON_PADS[id].nota); }catch(e){}
  setTimeout(()=>pad.classList.remove('on'),380);
}
function simonAvanzar(){
  _simonSec.push(UI.azar([0,1,2,3]));
  _simonNivel=_simonSec.length;
  const nEl=document.getElementById('simonN'); if(nEl) nEl.textContent=_simonNivel;
  _simonPaso=0; _simonBloqueo=true;
  let i=0;
  const reproducir=()=>{
    if(i>=_simonSec.length){ _simonBloqueo=false; Mascota.animar('Ahora repetí 👆'); return; }
    simonBeep(_simonSec[i]); i++;
    setTimeout(reproducir,650);
  };
  setTimeout(reproducir,400);
}
function simonToque(ev){
  if(_simonBloqueo)return;
  const pad=ev.target.closest('.simon-pad'); if(!pad)return;
  const id=parseInt(pad.dataset.id,10);
  pad.classList.add('on'); setTimeout(()=>pad.classList.remove('on'),200);
  try{ Voz.hablar(SIMON_PADS[id].nota); }catch(e){}
  if(id===_simonSec[_simonPaso]){
    _simonPaso++;
    if(_simonPaso===_simonSec.length){           // completó la secuencia
      _simonBloqueo=true;
      Estado.sumarEstrella(); Mascota.festejar();
      if(!(window.Calma&&Calma.activo)) Confeti.lanzar();
      setTimeout(simonAvanzar,1100);
    }
  }else{                                          // se equivocó: vuelve a mostrar desde el nivel 1 actual
    _simonBloqueo=true; Estado.registrarFallo('simon');
    Mascota.animar('Casi. Mirá otra vez 👀'); Voz.hablar('Casi. Mirá la secuencia otra vez');
    _simonSec.pop(); if(_simonSec.length<1) _simonSec=[]; // baja un escalón, no reinicia del todo
    setTimeout(()=>{ if(_simonSec.length===0) simonAvanzar(); else { _simonPaso=0; _simonBloqueo=true; let i=0;
      const rep=()=>{ if(i>=_simonSec.length){_simonBloqueo=false;return;} simonBeep(_simonSec[i]); i++; setTimeout(rep,650); }; setTimeout(rep,300);
    } },1200);
  }
}

/* ===================== MÓDULO 3 · PALABRAS ===================== */
function modPalabras(){ ordenarLetras(0); }
function ordenarLetras(aciertos){
  if(aciertos>=Nivel.metaRonda(4)){ return finRonda('pal', modPalabras); }
  // En grados altos, preferir palabras más largas
  const e=Nivel.escalon();
  let pool=Banco.palabras;
  if(e>=2){ const largas=pool.filter(p=>p.t.length>=5); if(largas.length>=4) pool=largas; }
  if(e>=3){ const muyLargas=pool.filter(p=>p.t.length>=6); if(muyLargas.length>=4) pool=muyLargas; }
  const palObj=UI.azar(pool);
  const pal=palObj.t;
  const letras=UI.mezclar(pal.split(''));
  P.innerHTML=`
   <div class="escena">
     <div class="tarjeta">
       <div>${renderImg(palObj.img)}</div>
       <div class="consigna">Ordená las letras</div>
       <div class="casillas" id="casillas">${pal.split('').map(()=>`<div class="casilla"></div>`).join('')}</div>
       <div class="letras-pool" id="pool">${letras.map((l,i)=>`<div class="ficha" data-l="${l}" data-i="${i}">${l}</div>`).join('')}</div>
       <button class="btn-sonido" onclick="Voz.hablar('${pal}')">🔊 Escuchar palabra</button>
     </div>
   </div>`;
  hidratarImgs();
  const objetivo=pal.split('');             // letras correctas en orden
  const casillas=[...document.querySelectorAll('#casillas .casilla')];
  let pos=0;                                // próxima casilla a completar
  document.getElementById('pool').onclick=e=>{
    const f=e.target.closest('.ficha'); if(!f||f.dataset.used||pos>=casillas.length)return;
    const letraEsperada=objetivo[pos];
    if(f.dataset.l===letraEsperada){
      // CORRECTA: se queda colocada y avanzamos
      f.dataset.used=1; f.style.visibility='hidden';
      casillas[pos].textContent=f.dataset.l;
      casillas[pos].classList.add('correcto');
      Voz.hablar(f.dataset.l); pos++;
      if(pos===casillas.length){
        // palabra terminada correctamente
        Estado.sumarEstrella(2); Mascota.festejar(); Voz.hablar(pal);
        setTimeout(()=>ordenarLetras(aciertos+1),1400);
      }
    }else{
      // INCORRECTA: NO se coloca. Le decimos cuál va y lo dejamos volver a intentar en la MISMA palabra.
      f.classList.add('incorrecto');
      setTimeout(()=>f.classList.remove('incorrecto'),600);
      casillas[pos].classList.add('pista'); setTimeout(()=>casillas[pos].classList.remove('pista'),900);
      Estado.registrarFallo('palabra '+pal);
      Mascota.animar('Esa no. Ahora va la '+letraEsperada);
      Voz.hablar('Esa no. Buscá la '+letraEsperada);
    }
  };
}

/* ===================== MÓDULO 4 · FRASES ===================== */
let _frasesRonda=[];
function modFrases(){
  // Elegimos frases acordes al nivel y las barajamos para que NO salgan siempre
  // las mismas ni en el mismo orden (evita que el niño las memorice).
  const e=Nivel.escalon();
  let pool=Banco.frases.slice();
  if(e<=0){ // jardín: frases más cortas
    const cortas=pool.filter(f=>f.t.length<=22); if(cortas.length>=5) pool=cortas;
  }else if(e===1){ // 1°-2°: cortas y medias
    const medias=pool.filter(f=>f.t.length<=34); if(medias.length>=5) pool=medias;
  }else if(e>=3){ // 5° en adelante: priorizar las largas
    const largas=pool.filter(f=>f.t.length>=30); if(largas.length>=4) pool=largas;
  }
  _frasesRonda=UI.mezclar(pool);
  rondaFrase(0);
}
function rondaFrase(i){
  if(i>=_frasesRonda.length){ return finRonda('fra', modFrases); }
  const f=_frasesRonda[i];
  const fraseEsc=f.t.replace(/'/g,"\\'");
  const pregEsc=f.preg.replace(/'/g,"\\'");
  P.innerHTML=`
   <div class="escena">
     <div class="tarjeta">
       <div class="frase-leer">${f.t}</div>
       <button class="fab-leer" onclick="Voz.hablar('${fraseEsc}')">🔊 Leer la frase</button>
       <div class="consigna" style="margin-top:8px;cursor:pointer" onclick="Voz.hablar('${pregEsc}')">${f.preg} 🔊</div>
       <button class="btn-sonido" style="font-size:.95rem" onclick="Voz.hablar('${pregEsc}')">🔊 Escuchar la pregunta</button>
       <div class="fila-emoji" id="ops">
         ${UI.mezclar(f.ops).map(o=>`<div class="opcion-img" data-ok="${o[1]}">${renderImg(o[0],'2.6rem')}</div>`).join('')}
       </div>
     </div>
   </div>`;
  hidratarImgs();
  // leer la frase y, después de una pausa, la pregunta (el nene no lee solo)
  Voz.hablar(f.t);
  setTimeout(()=>Voz.hablar(f.preg), Math.max(1600, f.t.length*90));
  document.getElementById('ops').onclick=e=>{
    const el=e.target.closest('.opcion-img'); if(!el||el.dataset.done)return;
    if(el.dataset.ok==='true'){ el.dataset.done=1; el.classList.add('correcto'); Estado.sumarEstrella(2); Mascota.festejar();
      setTimeout(()=>rondaFrase(i+1),1200);
    }else{ el.classList.add('incorrecto'); Estado.registrarFallo('comprensión');
      Mascota.animar('Esa no. Escuchá la pregunta otra vez 👇'); Voz.hablar(f.preg);
      setTimeout(()=>el.classList.remove('incorrecto'),700);
    }
  };
}

/* ===================== JUEGO · ¿QUÉ SIGUE? (patrones/secuencias) =====================
   Razonamiento y anticipación. La dificultad aumenta el largo del patrón. */
function juegoSecuencia(){ rondaSecuencia(0); }
function rondaSecuencia(aciertos){
  const meta=Nivel.metaRonda(4);
  if(aciertos>=meta){ return finRonda('comp', juegoSecuencia); }
  const simbolos=Banco.data.contables;
  // largo del patrón base sube con el grado: AB, ABC, ABB, ABCD...
  const tipos=[ ['A','B'], ['A','B'], ['A','B','C'], ['A','A','B'], ['A','B','C','D'] ];
  const e=Nivel.escalon();
  const patron = tipos[Math.min(e,tipos.length-1)];
  const unicos=UI.mezclar(simbolos).slice(0, new Set(patron).size);
  const mapa={}; [...new Set(patron)].forEach((k,i)=>mapa[k]=unicos[i]);
  // cuántas repeticiones mostrar
  const reps = e<=1?2:3;
  let seq=[]; for(let r=0;r<reps;r++) patron.forEach(p=>seq.push(mapa[p]));
  // la respuesta es el siguiente símbolo del patrón
  const idxSiguiente = seq.length % patron.length;
  const correcto = mapa[patron[idxSiguiente]];
  // opciones
  const distract=UI.mezclar(simbolos.filter(s=>s!==correcto)).slice(0,2);
  const ops=UI.mezclar([[correcto,true],...distract.map(d=>[d,false])]);

  P.innerHTML=`
   <div class="escena">
     <div class="tarjeta">
       <div class="consigna">¿Qué sigue? 🤔</div>
       <div class="secuencia">
         ${seq.map(s=>`<span class="sec-item">${s}</span>`).join('')}
         <span class="sec-item sec-vacio">❓</span>
       </div>
       <div class="fila-emoji" id="ops">
         ${ops.map(o=>`<div class="opcion-img" data-ok="${o[1]}">${o[0]}</div>`).join('')}
       </div>
     </div>
   </div>`;
  Voz.hablar('¿Qué sigue?');
  document.getElementById('ops').onclick=ev=>{
    const el=ev.target.closest('.opcion-img'); if(!el||el.dataset.done)return;
    el.dataset.done=1;
    if(el.dataset.ok==='true'){ el.classList.add('correcto');
      const vacio=document.querySelector('.sec-vacio'); if(vacio){vacio.textContent=correcto;vacio.classList.remove('sec-vacio');}
      Estado.sumarEstrella(); Mascota.festejar();
      setTimeout(()=>rondaSecuencia(aciertos+1),1200);
    }else{ el.classList.add('incorrecto'); Estado.registrarFallo('secuencia');
      Mascota.animar('Mirá el patrón otra vez 👀');
      setTimeout(()=>{ el.classList.remove('incorrecto'); delete el.dataset.done; },900);
    }
  };
}

let _ctx=null, _pintando=false, _colorActual=null, _pathActual='';
function iniciarLienzo(pathFigura){
  const canvas=document.getElementById('lienzo');
  _ctx=canvas.getContext('2d');
  _pathActual=pathFigura;
  _colorActual=document.querySelector('.color-pincel.sel')?.dataset.c || '#e63946';
  // paleta: elegir color
  document.getElementById('paleta').onclick=e=>{
    const c=e.target.closest('.color-pincel'); if(!c)return;
    document.querySelectorAll('.color-pincel').forEach(x=>x.classList.remove('sel'));
    c.classList.add('sel'); _colorActual=c.dataset.c;
  };
  // construir el Path2D de la figura escalado al tamaño del canvas (300 = 100*3)
  const escala=3;
  const dibujarTrazo=(x,y)=>{
    _ctx.save();
    _ctx.scale(escala,escala);
    _ctx.clip(new Path2D(pathFigura));   // solo se pinta DENTRO de la figura
    _ctx.fillStyle=_colorActual;
    _ctx.beginPath();
    _ctx.arc(x/escala, y/escala, 7, 0, Math.PI*2);  // pincel redondo
    _ctx.fill();
    _ctx.restore();
  };
  const pos=ev=>{
    const r=canvas.getBoundingClientRect();
    const t=ev.touches?ev.touches[0]:ev;
    return { x:(t.clientX-r.left)*(canvas.width/r.width), y:(t.clientY-r.top)*(canvas.height/r.height) };
  };
  const start=ev=>{ ev.preventDefault(); _pintando=true; const p=pos(ev); dibujarTrazo(p.x,p.y); };
  const move=ev=>{ if(!_pintando)return; ev.preventDefault(); const p=pos(ev); dibujarTrazo(p.x,p.y); };
  const end=()=>{ _pintando=false; };
  canvas.addEventListener('pointerdown',start);
  canvas.addEventListener('pointermove',move);
  canvas.addEventListener('pointerup',end);
  canvas.addEventListener('pointerleave',end);
  // respaldo touch para WebViews viejos
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end);
}
function limpiarLienzo(){ if(_ctx){ _ctx.clearRect(0,0,300,300); } }

/* ===================== RUTINA VISUAL (pictogramas) =====================
   Muy útil en TEA: muestra la secuencia del día, el nene marca lo que va
   cumpliendo. Da previsibilidad y baja la ansiedad por anticipación. */
function pantallaRutina(){
  const lista=Banco.data.rutina||DEF.rutina;
  // guardamos qué pasos están hechos en el día (se reinicia manual)
  const hechos=JSON.parse(localStorage.getItem('leoyjuego-rutina-hechos')||'[]');
  const primerPend=lista.findIndex((_,i)=>!hechos.includes(i));
  P.innerHTML=`<h1 class="titulo">📋 Mi Rutina</h1>
   <div class="escena" style="justify-content:flex-start;padding-top:6px">
     <div class="rutina-lista" id="rutLista">
       ${lista.map((p,i)=>{
         const hecho=hechos.includes(i);
         const actual=i===primerPend;
         return `<div class="rutina-paso ${hecho?'hecho':''} ${actual?'actual':''}" data-i="${i}">
            <span class="pic">${p.ico}</span>
            <span class="nom">${p.txt}</span>
            <span class="check">✓</span>
          </div>`;}).join('')}
     </div>
     <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px">
       <button class="btn-grafismo" onclick="reiniciarRutina()">🔄 Empezar de nuevo</button>
       <button class="btn-grafismo" style="background:var(--cielo-hondo)" onclick="Nav.ir(pantallaTimer)">⏳ Temporizador</button>
     </div>
   </div>`;
  document.getElementById('rutLista').onclick=e=>{
    const paso=e.target.closest('.rutina-paso'); if(!paso)return;
    const i=+paso.dataset.i;
    let h=JSON.parse(localStorage.getItem('leoyjuego-rutina-hechos')||'[]');
    if(h.includes(i)){ h=h.filter(x=>x!==i); }
    else { h.push(i); Voz.hablar(lista[i].txt); Estado.sumarEstrella(); Mascota.animar('¡Muy bien!'); }
    localStorage.setItem('leoyjuego-rutina-hechos', JSON.stringify(h));
    if(h.length===lista.length){ Mascota.festejar(); Voz.hablar('¡Terminaste toda tu rutina!'); }
    pantallaRutina();
  };
}

/* ===================== TEMPORIZADOR VISUAL =====================
   Reloj circular que se vacía. Ayuda con las transiciones entre
   actividades (saber cuánto falta reduce la ansiedad). */
window._timerInt=null;
function pantallaTimer(){
  if(window._timerInt){ clearInterval(window._timerInt); window._timerInt=null; }
  const R=88, C=2*Math.PI*R;
  P.innerHTML=`<h1 class="titulo">⏳ Temporizador</h1>
   <div class="escena">
     <div class="tarjeta">
       <div class="timer-wrap">
         <div class="timer-circulo">
           <svg width="200" height="200" viewBox="0 0 200 200">
             <circle cx="100" cy="100" r="${R}" fill="none" stroke="#e6e6e6" stroke-width="16"/>
             <circle id="timerBarra" class="barra-activa" cx="100" cy="100" r="${R}" fill="none" stroke="var(--cielo)" stroke-width="16"
                stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="0"/>
           </svg>
           <div class="timer-num" id="timerNum">0:00</div>
         </div>
         <div class="timer-btns" id="timerPresets">
           <button class="timer-preset" data-seg="60">1 min</button>
           <button class="timer-preset" data-seg="120">2 min</button>
           <button class="timer-preset" data-seg="300">5 min</button>
           <button class="timer-preset" data-seg="600">10 min</button>
         </div>
         <div class="timer-btns">
           <button class="fab-leer" id="timerStart">▶️ Empezar</button>
           <button class="btn-sonido" id="timerStop">⏹️ Parar</button>
         </div>
       </div>
     </div>
   </div>`;
  let total=60, restante=60, corriendo=false;
  const barra=document.getElementById('timerBarra');
  const num=document.getElementById('timerNum');
  const fmt=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  const pintar=()=>{ num.textContent=fmt(restante);
    barra.style.strokeDashoffset = C*(1-restante/total); };
  const setTotal=s=>{ total=s; restante=s; pintar(); };
  setTotal(60); document.querySelector('.timer-preset[data-seg="60"]').classList.add('sel');

  document.getElementById('timerPresets').onclick=e=>{
    const b=e.target.closest('.timer-preset'); if(!b)return;
    document.querySelectorAll('.timer-preset').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); if(window._timerInt){clearInterval(window._timerInt);window._timerInt=null;corriendo=false;}
    setTotal(+b.dataset.seg);
  };
  document.getElementById('timerStart').onclick=()=>{
    if(corriendo) return; corriendo=true; Voz.hablar('Empezamos');
    window._timerInt=setInterval(()=>{
      restante--; pintar();
      if(restante<=0){ clearInterval(window._timerInt); window._timerInt=null; corriendo=false;
        num.textContent='¡Listo!'; Voz.hablar('¡Se terminó el tiempo!'); Mascota.festejar();
        if(!(window.Calma&&Calma.activo)) Confeti.lanzar();
      }
    },1000);
  };
  document.getElementById('timerStop').onclick=()=>{
    if(window._timerInt){clearInterval(window._timerInt);window._timerInt=null;} corriendo=false; setTotal(total);
  };
}
