/* --- Probador y ajuste de pronunciación de sílabas ---
   El motor de voz a veces lee mal sílabas sueltas. Acá el padre escucha cada
   una y, si suena mal, escribe cómo se debería escribir para que suene bien,
   o la graba con su voz. */
function pantallaProbadorSilabas(){
  // armar la lista de sílabas que usan los módulos (de las palabras silabeadas)
  const setS=new Set();
  (Banco.data.silabeadas||[]).forEach(it=> (it.sil||[]).forEach(s=>setS.add(String(s).toLowerCase())));
  // agregar también las sílabas básicas consonante+vocal del orden fónico
  ordenFonico().forEach(c=>VOCALES.forEach(v=>setS.add((c+v).toLowerCase())));
  const silabas=[...setS].sort();
  const ajustes=Estado.data.ajustesSilaba||{};
  P.innerHTML=`<h1 class="titulo">🗣️ Probar sílabas</h1>
   <div class="form">
     <p style="font-size:.85rem;color:#666">Tocá 🔊 para escuchar cada sílaba. Si suena mal, escribí al lado cómo conviene escribirla y tocá 🔊 de nuevo hasta que salga bien:<br>
     • "be" suena "bi" → probá <b>bé</b> o <b>bee</b><br>
     • "lle" se deletrea → probá <b>ye</b> (ya viene puesto)<br>
     • "to" suena "tu" → probá <b>tó</b><br>
     Dejá en blanco las que ya suenan bien. Lo que escribís se guarda solo.</p>
     <div id="listaProb"></div>
   </div>`;
  pintarProbador(silabas, ajustes);
}
function pintarProbador(silabas, ajustes){
  const cont=document.getElementById('listaProb'); if(!cont)return;
  cont.innerHTML=silabas.map(s=>{
    // valor a mostrar: ajuste del padre, o la corrección por defecto si existe
    const aj = (ajustes[s]!==undefined ? ajustes[s] : (CORRECCION_SILABA[s]||''));
    const porDefecto = ajustes[s]===undefined && CORRECCION_SILABA[s];
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #eee">
      <b style="font-family:var(--fuente-display);min-width:54px;font-size:1.3rem">${s}</b>
      <input value="${aj}" placeholder="(suena bien)" data-sil="${s}" class="aj-input"
        title="${porDefecto?'corrección automática':''}"
        style="flex:1;border:2px solid ${porDefecto?'var(--sol)':'#ddd'};border-radius:10px;padding:8px;font-size:1rem">
      <button class="btn-sonido" style="padding:8px 12px;font-size:.95rem" data-test="${s}">🔊</button>
    </div>`;}).join('');
  cont.onclick=e=>{
    const b=e.target.closest('[data-test]'); if(!b)return;
    const s=b.dataset.test;
    let inp=null;
    cont.querySelectorAll('.aj-input').forEach(x=>{ if(x.dataset.sil===s) inp=x; });
    const valor=inp&&inp.value.trim();
    if(!Estado.data.ajustesSilaba) Estado.data.ajustesSilaba={};
    if(valor){ Estado.data.ajustesSilaba[s]=valor; }
    else { Estado.data.ajustesSilaba[s]=''; } // vacío explícito = "decir tal cual"
    Estado.guardar();
    // probar exactamente lo que va a sonar
    const txt = valor || s;
    Voz.hablar(txt,{rate:.85,pitch:1.05});
  };
}
function llenarVoces(){
  const sel=document.getElementById('selVoz'); if(!sel) return;
  const vs=speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith('es'));
  if(!vs.length){ sel.innerHTML='<option>Sin voces en español instaladas</option>'; return; }
  if(!Voz.vozPref) Voz.elegirVoz();
  sel.innerHTML=vs.map(v=>`<option value="${v.name}" ${Voz.vozPref&&Voz.vozPref.name===v.name?'selected':''}>${v.name} (${v.lang})</option>`).join('');
  sel.onchange=()=>{ const v=vs.find(x=>x.name===sel.value); if(v){ Voz.vozPref=v; Estado.data.voz=v.name; Estado.guardar(); Voz.hablar('¡Muy bien!'); } };
}
function diagnosticoVoz(){
  const d=document.getElementById('diagVoz'); if(!d) return;
  d.innerHTML='Probando...';
  const TTS=Voz.ttsNativo();
  if(TTS){
    d.innerHTML='✅ Usando el motor de voz de Android (nativo).';
    Voz._ultimoError='probando';
    Voz.hablar('Hola, probando uno, dos, tres');
    setTimeout(()=>{ d.innerHTML='✅ Motor nativo de Android.<br>Estado: '+(Voz._ultimoError||'sin respuesta'); },1500);
    return;
  }
  // navegador
  const todas=('speechSynthesis' in window)?speechSynthesis.getVoices():[];
  const es=todas.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('es'));
  let txt='';
  if(!('speechSynthesis' in window)){ txt='❌ Sin soporte de voz.'; }
  else if(!todas.length){ txt='⚠️ No se detectaron voces.'; }
  else { txt=`✅ Voces: ${todas.length} · español: ${es.length}`; }
  d.innerHTML=txt;
  Voz._ultimoError='probando';
  Voz.hablar('Probando, uno, dos, tres');
  setTimeout(()=>{ d.innerHTML=txt+'<br>Estado: '+(Voz._ultimoError||'sin respuesta'); },1500);
}

/* ===================== GRABADOR DE SONIDOS ===================== */
function pantallaGrabar(){
  // Palabras del método fonético (las del juego de Sonidos y Sílabas)
  const palabrasFonico=[...new Set((Banco.data.silabeadas||[]).map(it=>String(it.pal).toUpperCase()))];
  // Sílabas REALES que usan esas palabras
  const silReales=new Set();
  (Banco.data.silabeadas||[]).forEach(it=> (it.sil||[]).forEach(s=>silReales.add(String(s).toUpperCase())));
  const silabasUsadas=[...silReales].sort();
  // sílabas básicas consonante+vocal (por si querés grabar todas)
  const silabasBasicas=[]; ordenFonico().forEach(c=>VOCALES.forEach(v=>{ const s=c+v; if(!silReales.has(s)) silabasBasicas.push(s); }));
  const letras=ordenFonico().concat(VOCALES);
  const grupos=[
    {tit:'⭐ Palabras del método (¡grabá estas primero!)', items:palabrasFonico, destacar:true},
    {tit:'Sílabas sueltas (be, to, rra...)', items:silabasUsadas},
    {tit:'Otras sílabas (opcional)', items:silabasBasicas},
    {tit:'Sonidos de letras', items:letras},
    {tit:'Otras palabras', items:listaPalabras().filter(p=>!palabrasFonico.includes(p))}
  ];
  P.innerHTML=`<h1 class="titulo">🎙️ Grabar sonidos</h1>
   <div class="form">
     <p style="font-size:.85rem;color:#666">El celular lee mal las sílabas, así que <b>grabalas con tu voz</b>. Tocá 🔴, decí la palabra o sílaba clara, tocá ⏹️. ▶️ escucha, 🗑️ borra. <b>Verde = grabado.</b><br>💡 Si grabás la <b>palabra completa</b> (ej: "gato"), el juego la usa al unir las sílabas.</p>
     <div id="contadorGrab" style="background:var(--sol);border-radius:12px;padding:10px;text-align:center;font-weight:800;margin-bottom:8px"></div>
     ${grupos.filter(g=>g.items.length).map(g=>`
       <b style="margin-top:8px;display:block;${g.destacar?'color:var(--coral)':''}">${g.tit}</b>
       <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">
         ${g.items.map(it=>`
           <div class="grab-item" data-k="${it}" style="display:flex;align-items:center;gap:4px;background:#eef;border-radius:12px;padding:6px 8px">
             <b style="font-family:var(--fuente-display);min-width:40px;text-align:center">${it}</b>
             <button class="grab-btn" data-act="rec" data-k="${it}" style="border:none;background:none;font-size:1.3rem;cursor:pointer">🔴</button>
             <button class="grab-btn" data-act="play" data-k="${it}" style="border:none;background:none;font-size:1.3rem;cursor:pointer">▶️</button>
             <button class="grab-btn" data-act="del" data-k="${it}" style="border:none;background:none;font-size:1.1rem;cursor:pointer">🗑️</button>
           </div>`).join('')}
       </div>`).join('')}
   </div>`;
  // marcar los que ya tienen audio (verde) y actualizar contador
  async function refrescarContador(){
    let grabadas=0;
    for(const s of palabrasFonico){ if(await Audios.tiene(s)) grabadas++; }
    const c=document.getElementById('contadorGrab');
    if(c){ const faltan=palabrasFonico.length-grabadas;
      c.textContent = faltan===0 ? `✅ ¡Todas las palabras grabadas! (${grabadas})` : `Palabras grabadas: ${grabadas} de ${palabrasFonico.length} · Faltan ${faltan}`;
      c.style.background = faltan===0 ? 'var(--pasto)' : 'var(--sol)';
      c.style.color = faltan===0 ? '#fff' : 'var(--pizarron)';
    }
  }
  document.querySelectorAll('.grab-item').forEach(async el=>{
    if(await Audios.tiene(el.dataset.k)){ el.style.background='var(--pasto)'; el.style.color='#fff'; }
  });
  refrescarContador();
  let grabandoK=null;
  P.querySelector('.form').onclick=async e=>{
    const b=e.target.closest('.grab-btn'); if(!b)return;
    const k=b.dataset.k; let item=null;
    P.querySelectorAll('.grab-item').forEach(x=>{ if(x.dataset.k===k) item=x; });
    if(b.dataset.act==='play'){ if(!await Audios.reproducir(k)) Mascota.animar('Ese sonido todavía no está grabado'); return; }
    if(b.dataset.act==='del'){ await Audios.borrar(k); item.style.background='#eef'; item.style.color=''; refrescarContador(); return; }
    if(b.dataset.act==='rec'){
      if(grabandoK===null){
        try{ await Grabador.iniciar(); grabandoK=k; b.textContent='⏹️'; item.style.background='var(--coral)'; item.style.color='#fff'; }
        catch(err){ Mascota.animar(Grabador.mensajeError()); }
      }else if(grabandoK===k){
        const blob=await Grabador.detener(); await Audios.guardar(k,blob);
        b.textContent='🔴'; item.style.background='var(--pasto)'; item.style.color='#fff'; grabandoK=null;
        Audios.reproducir(k); refrescarContador();
      }else{ Mascota.animar('Terminá la grabación anterior primero'); }
    }
  };
}

/* ===================== EXPORTAR / IMPORTAR ===================== */
async function exportarContenido(){
  // empaquetar banco + imágenes (base64) + audios (base64) en un JSON
  const paquete={ version:1, banco:Banco.data, imgs:{}, audios:{} };
  const b2d=blob=>new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
  // imágenes referenciadas
  const idsImg=new Set();
  Banco.palabras.forEach(p=>{if(typeof p.img==='string'&&p.img.startsWith('img:'))idsImg.add(p.img);});
  Banco.frases.forEach(f=>f.ops.forEach(o=>{if(typeof o[0]==='string'&&o[0].startsWith('img:'))idsImg.add(o[0]);}));
  Banco.data.silabeadas.forEach(s=>{if(typeof s.img==='string'&&s.img.startsWith('img:'))idsImg.add(s.img);});
  for(const id of idsImg){ const bl=await Imagenes.obtener(id); if(bl) paquete.imgs[id]=await b2d(bl); }
  // audios grabados
  const claves=listaPalabras().concat(ordenFonico(),VOCALES);
  ordenFonico().forEach(c=>VOCALES.forEach(v=>claves.push(c+v)));
  for(const k of [...new Set(claves)]){ const bl=await Audios.obtener(k); if(bl) paquete.audios[k]=await b2d(bl); }
  const blob=new Blob([JSON.stringify(paquete)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='leoyjuego-contenido.json'; a.click();
  Mascota.animar('¡Contenido exportado!');
}
async function importarContenido(file){
  if(!file) return;
  try{
    const txt=await file.text(); const paq=JSON.parse(txt);
    if(!paq.banco){ Mascota.animar('Archivo no válido'); return; }
    if(!confirm('¿Reemplazar el contenido actual con el importado?')) return;
    const d2b=async dataurl=>{ const r=await fetch(dataurl); return await r.blob(); };
    if(paq.imgs) for(const id in paq.imgs){ await Imagenes.guardar(id, await d2b(paq.imgs[id])); }
    if(paq.audios) for(const k in paq.audios){ await Audios.guardar(k, await d2b(paq.audios[k])); }
    Banco.data=paq.banco; Banco.guardar();
    Mascota.animar('¡Contenido importado!'); Nav.reset(pantallaMenu);
  }catch(e){ Mascota.animar('No pude leer el archivo'); }
}

/* ===================== AUTO-ACTUALIZACIÓN DESDE GITHUB =====================
   La app funciona 100% offline (este archivo trae todo adentro). Pero al abrir,
   si hay internet, revisa si hay una versión más nueva publicada en GitHub y la
   descarga en silencio para la próxima vez. Nunca interrumpe al nene.

   CÓMO PUBLICAR UNA MEJORA:
   1. Subí el index.html nuevo a tu GitHub (carpeta raíz del repo).
   2. Subí también version.json con el número subido, ej: {"version": 8}
   3. Listo: las apps lo toman solas la próxima vez que abran con internet.

   IMPORTANTE: cada vez que cambies el contenido, subí APP_VERSION acá abajo
   y el mismo número en version.json. */
const APP_VERSION = 22;
const URL_BASE = 'https://ricardochaj.github.io/leo-y-juego/';

const AutoActualizar = {
  async revisar(){
    try{
      // 1) ¿hay una versión ya descargada en una apertura anterior?
      const guardada = localStorage.getItem('leoyjuego-html-version');
      const htmlGuardado = localStorage.getItem('leoyjuego-html');
      // si tengo guardada una más nueva que la que está corriendo, ya debería
      // haberse aplicado al cargar (ver aplicarSiHayNueva). Acá solo busco online.

      // 2) si no hay internet, salir tranquilo
      if(!navigator.onLine) return;

      // 3) leer el version.json del repo (archivo chiquito) con anti-caché
      const vResp = await fetch(URL_BASE+'version.json?t='+Date.now(), {cache:'no-store'});
      if(!vResp.ok) return;
      const vData = await vResp.json();
      const versionRemota = vData.version||0;

      // ¿la versión remota es más nueva que la que corre Y que la ya descargada?
      const yaDescargada = parseInt(guardada||'0',10);
      if(versionRemota <= APP_VERSION && versionRemota <= yaDescargada) return;

      // 4) descargar el index.html nuevo
      const hResp = await fetch(URL_BASE+'index.html?t='+Date.now(), {cache:'no-store'});
      if(!hResp.ok) return;
      const htmlNuevo = await hResp.text();
      // validación mínima: que parezca el archivo correcto
      if(htmlNuevo.length<1000 || !htmlNuevo.includes('Leo y Juego')) return;

      // 5) guardarlo para la próxima apertura
      localStorage.setItem('leoyjuego-html', htmlNuevo);
      localStorage.setItem('leoyjuego-html-version', String(versionRemota));
      // no recargamos ahora para no interrumpir; se aplica al próximo arranque
    }catch(e){ /* sin conexión o error: seguir con la versión actual */ }
  }
};
// revisar actualizaciones en segundo plano, sin bloquear el arranque
setTimeout(()=>AutoActualizar.revisar(), 3000);

/* ===================== ARRANQUE ===================== */
// Si hay una actualización pendiente de aplicarse (se aplica en el evento 'load'),
// esta versión vieja no debe arrancar: dejaría el menú viejo pintado un instante.
if(!window.__actualizando){
Estado.cargar();
Estado.registrarVisita();
Banco.cargar();
Calma.cargar();
// Fijar el alto real de la ventana (el WebView calcula mal vh/dvh tras document.write).
// Medimos por JS con la fuente más confiable y RE-medimos varias veces, porque tras
// document.write el WebView de Android tarda en acomodar la barra de navegación y el
// primer innerHeight suele venir más grande de lo real (eso dejaba espacio sobrante abajo).
function fijarAltoReal(){
  try{
    // clientHeight del documento suele ser el área visible real (sin barras del
    // sistema) en Android; lo preferimos a innerHeight, que a veces mide de más.
    var h = document.documentElement.clientHeight || 0;
    var vv = window.visualViewport ? Math.round(window.visualViewport.height) : 0;
    if(vv && (!h || vv < h)) h = vv;          // si visualViewport es menor, es el real
    if(!h || h<200) h = window.innerHeight;   // último recurso
    document.documentElement.style.setProperty('--alto-real', h+'px');
  }catch(e){}
}
fijarAltoReal();
// Re-medir en los primeros instantes (cuando el viewport ya se estabilizó).
[60,200,500,1000].forEach(function(t){ setTimeout(fijarAltoReal,t); });
window.addEventListener('load', fijarAltoReal);
window.addEventListener('resize', fijarAltoReal);
if(window.visualViewport){ window.visualViewport.addEventListener('resize', fijarAltoReal); }
window.addEventListener('orientationchange', ()=>setTimeout(fijarAltoReal,300));
// Despertar el motor de voz en la primera interacción (requerido en Android)
document.addEventListener('pointerdown',()=>Voz.despertar(),{once:true});
document.addEventListener('click',()=>Voz.despertar(),{once:true});
UI.refrescarEstrellas();
Mascota.cara.textContent=Estado.data.mascota;
// mostrar la versión en pantalla (para verificar actualizaciones)
try{ const vEl=document.getElementById('versionApp'); if(vEl) vEl.textContent='v'+APP_VERSION; }catch(e){}
// Reasegurar que los botones de navegación queden coherentes cada vez que
// cambia la pantalla (algunos juegos re-pintan vía setTimeout sin pasar por Nav).
try{
  const obs=new MutationObserver(()=>{ if(Nav&&Nav._actualizarBotones) Nav._actualizarBotones(); });
  obs.observe(document.getElementById('pantalla'),{childList:true});
}catch(e){}
if(Estado.data.nombre){ Nav.reset(pantallaMenu); }
else { _perfilEditar=true; Nav.reset(pantallaPerfil); }

// Avisar (una vez) si el dispositivo no tiene voz en español
setTimeout(()=>{
  if(!Voz.hayVozEspanol() && !Estado.data.avisoVoz){
    Mascota.animar('Para que la voz suene bien, instalá una voz en español en Ajustes',false);
    Estado.data.avisoVoz=true; Estado.guardar();
  }
},2500);
} // fin del if(!window.__actualizando) — guarda de actualización pendiente
</script>
